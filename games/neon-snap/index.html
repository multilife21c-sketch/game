<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neon Snap - v0.2 Update</title>
    <style>
        :root {
            --neon-cyan: #00ffcc;
            --neon-magenta: #ff0055;
            --neon-yellow: #ffff00;
            --bg-dark: #020206;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Segoe UI', Roboto, -apple-system, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .ui-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            padding: 20px;
            background: radial-gradient(circle at center, rgba(10, 10, 30, 0.4) 0%, rgba(2, 2, 6, 0.8) 100%);
        }
        .fullscreen-container {
            width: 100%;
            height: 100%;
            max-width: 1200px;
            max-height: 800px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 20px;
            z-index: 11;
        }
        .header-group {
            text-align: center;
            margin-bottom: 20px;
        }
        h1 {
            font-size: calc(2.5rem + 3vw);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 8px;
            color: var(--neon-cyan);
            text-shadow: 0 0 20px rgba(0, 255, 204, 0.6), 0 0 40px rgba(0, 255, 204, 0.3);
            line-height: 1.1;
            animation: glitch 3s infinite alternate;
        }
        .subtitle {
            font-size: calc(0.8rem + 0.5vw);
            color: #8899af;
            margin-top: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        .main-content {
            width: 100%;
            max-width: 600px;
            background: rgba(5, 5, 15, 0.75);
            border: 2px solid var(--neon-cyan);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .instructions {
            font-size: 14px;
            color: #cbd5e1;
            line-height: 1.6;
            text-align: left;
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid var(--neon-cyan);
        }
        .instructions strong {
            color: var(--neon-yellow);
        }
        .enemy-legend {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 6px;
            font-size: 12px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .btn {
            width: 100%;
            padding: 18px;
            background: transparent;
            border: 2px solid var(--neon-magenta);
            color: var(--neon-magenta);
            font-size: 20px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.1);
        }
        .btn:hover, .btn:active {
            background: var(--neon-magenta);
            color: #fff;
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.6);
            transform: translateY(-2px);
        }
        .btn-start {
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.1);
        }
        .btn-start:hover, .btn-start:active {
            background: var(--neon-cyan);
            color: var(--bg-dark);
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.6);
        }
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 25px;
            z-index: 5;
            pointer-events: none;
            color: #fff;
            display: flex;
            justify-content: space-between;
            font-family: monospace;
        }
        .hud-item {
            font-size: calc(14px + 0.8vw);
            font-weight: bold;
            letter-spacing: 2px;
        }
        #scoreDisplay {
            color: var(--neon-cyan);
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }
        #hpDisplay {
            color: var(--neon-magenta);
            text-shadow: 0 0 10px rgba(255, 0, 85, 0.5);
        }
        #effectBanner {
            position: absolute;
            top: 70px;
            width: 100%;
            text-align: center;
            font-family: monospace;
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 2px;
            pointer-events: none;
            z-index: 5;
            display: none;
            text-shadow: 0 0 15px currentColor;
        }
        .leaderboard {
            text-align: left;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 15px;
            width: 100%;
        }
        .leaderboard h3 {
            font-size: 14px;
            color: var(--neon-yellow);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .rank-item {
            display: flex;
            justify-content: space-between;
            font-family: monospace;
            font-size: 14px;
            margin-bottom: 6px;
            color: #e2e8f0;
            background: rgba(255,255,255,0.02);
            padding: 6px 10px;
            border-radius: 4px;
        }
        input[type="text"] {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border: 2px solid var(--neon-magenta);
            border-radius: 8px;
            color: #fff;
            font-size: 18px;
            text-align: center;
            outline: none;
            font-weight: bold;
            letter-spacing: 2px;
        }
        input[type="text"]:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
        }
        .version-tag {
            position: absolute;
            bottom: 15px;
            right: 20px;
            font-family: monospace;
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            letter-spacing: 1px;
            z-index: 20;
        }
        @keyframes glitch {
            0% { text-shadow: 0 0 20px rgba(0,255,204,0.6); }
            92% { text-shadow: 0 0 20px rgba(0,255,204,0.6); transform: skew(0deg); }
            94% { text-shadow: -3px 0 var(--neon-magenta), 3px 0 var(--neon-cyan); transform: skew(3deg); }
            96% { text-shadow: 3px 0 var(--neon-magenta), -3px 0 var(--neon-cyan); transform: skew(-2deg); }
            98% { text-shadow: 0 0 20px rgba(0,255,204,0.6); transform: skew(0deg); }
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="hud" style="display:none;">
        <div class="hud-item" id="scoreDisplay">SCORE: 0</div>
        <div class="hud-item" id="hpDisplay">CORE: 100%</div>
    </div>
    
    <div id="effectBanner"></div>

    <div id="startScreen" class="ui-screen">
        <div class="version-tag">v0.2</div>
        <div class="fullscreen-container">
            <div class="header-group">
                <h1>NEON SNAP</h1>
                <div class="subtitle">Tension Slicing Action • Ultimate</div>
            </div>
            
            <div class="main-content">
                <div class="instructions">
                    <strong>💡 [v0.2 신규] 아이템 등장!</strong><br>
                    게임 중 화면에 등장하는 특수 아이템(마름모꼴)을 베면 강력한 버프 효과가 발동합니다. 상단 타이머를 확인하며 전략적으로 활용하세요!
                </div>
                
                <div class="enemy-legend">
                    <div class="legend-item"><div class="dot" style="background:#00ccff"></div> 빙결(FREEZE)</div>
                    <div class="legend-item"><div class="dot" style="background:#ffcc00"></div> 점수두배(DOUBLE)</div>
                    <div class="legend-item"><div class="dot" style="background:#00ff66"></div> 방패(SHIELD)</div>
                </div>

                <button class="btn btn-start" onclick="game.start()">시스템 기동 (START)</button>
                
                <div class="leaderboard">
                    <h3>🏆 글로벌 터미널 랭킹</h3>
                    <div id="startLeaderboard"></div>
                </div>
            </div>
            <div></div> </div>
    </div>

    <div id="gameOverScreen" class="ui-screen" style="display:none;">
        <div class="version-tag">v0.2</div>
        <div class="fullscreen-container">
            <div class="header-group">
                <h1>CONNECTION LOST</h1>
                <div class="subtitle" id="finalScoreDisplay">최종 동기화 점수: 0</div>
            </div>
            
            <div class="main-content">
                <input type="text" id="nicknameInput" placeholder="ACCESS CODE (이름 입력)" maxlength="10">
                <button class="btn btn-start" onclick="game.submitScore()">데이터 업로드 및 재시작</button>
                <button class="btn" onclick="game.showStartScreen()">메인 터미널로</button>

                <div class="leaderboard">
                    <h3>🏆 현재 저장소 순위</h3>
                    <div id="endLeaderboard"></div>
                </div>
            </div>
            <div></div>
        </div>
    </div>

    <script>
        // 절차적 오디오 엔진 (Web Audio API 백엔드)
        class SoundEngine {
            constructor() {
                this.ctx = null;
            }
            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
            }
            playSnap() {
                if (!this.ctx) return;
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(150, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, this.ctx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.08);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.08);
            }
            playExplode(isArmored = false) {
                if (!this.ctx) return;
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(isArmored ? 120 : 200, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, this.ctx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.4, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.25);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.25);
            }
            playHurt() {
                if (!this.ctx) return;
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(100, this.ctx.currentTime);
                osc.frequency.setValueAtTime(60, this.ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.2);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.2);
            }
            playPowerUp() {
                if (!this.ctx) return;
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, this.ctx.currentTime);
                osc.frequency.setValueAtTime(600, this.ctx.currentTime + 0.1);
                osc.frequency.setValueAtTime(800, this.ctx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.4);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.4);
            }
            playShieldBlock() {
                if (!this.ctx) return;
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(200, this.ctx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.5, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.3);
            }
        }
        const sound = new SoundEngine();

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let width, height, dpr;
        function resize() {
            dpr = window.devicePixelRatio || 1;
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            ctx.scale(dpr, dpr);
        }
        window.addEventListener('resize', resize);
        resize();

        function lineCircleIntersect(x1, y1, x2, y2, cx, cy, r) {
            const dx = x2 - x1;
            const dy = y2 - y1;
            const lenSq = dx * dx + dy * dy;
            if (lenSq === 0) return false;
            let t = ((cx - x1) * dx + (cy - y1) * dy) / lenSq;
            t = Math.max(0, Math.min(1, t));
            const closestX = x1 + t * dx;
            const closestY = y1 + t * dy;
            const distSq = (cx - closestX) * (cx - closestX) + (cy - closestY) * (cy - closestY);
            return distSq <= r * r;
        }

        function hexToRgb(hex) {
            let result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}` : '255,255,255';
        }

        class FloatingText {
            constructor(x, y, text, color) {
                this.x = x;
                this.y = y;
                this.text = text;
                this.color = color;
                this.alpha = 1;
                this.vy = -2;
            }
            update(timeScale) {
                this.y += this.vy * timeScale;
                this.alpha -= 0.02 * timeScale;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.font = 'black 24px monospace';
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.textAlign = 'center';
                ctx.fillText(this.text, this.x, this.y);
                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, color, angle) {
                this.x = x;
                this.y = y;
                this.color = color;
                const speed = Math.random() * 10 + 5;
                const spread = (Math.random() - 0.5) * 2;
                this.vx = Math.cos(angle + spread) * speed * (Math.random() > 0.5 ? 1 : -1);
                this.vy = Math.sin(angle + spread) * speed * (Math.random() > 0.5 ? 1 : -1);
                this.size = Math.random() * 5 + 2;
                this.alpha = 1;
                this.decay = Math.random() * 0.02 + 0.01;
            }
            update(timeScale) {
                this.x += this.vx * timeScale;
                this.y += this.vy * timeScale;
                this.alpha -= this.decay * timeScale;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 12;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        class Item {
            constructor() {
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.max(width, height) * 0.6;
                this.x = width / 2 + Math.cos(angle) * distance;
                this.y = height / 2 + Math.sin(angle) * distance;
                
                const types = [
                    { id: 'FREEZE', name: 'TIME FREEZE', color: '#00ccff', duration: 5000, symbol: '❄️' },
                    { id: 'DOUBLE', name: 'DOUBLE SCORE', color: '#ffcc00', duration: 8000, symbol: 'x2' },
                    { id: 'SHIELD', name: 'CORE SHIELD', color: '#00ff66', duration: 10000, symbol: '🛡️' }
                ];
                this.info = types[Math.floor(Math.random() * types.length)];
                this.radius = 20;
                
                const moveAngle = Math.random() * Math.PI * 2;
                this.vx = Math.cos(moveAngle) * 0.5;
                this.vy = Math.sin(moveAngle) * 0.5;
                
                this.lifetime = 12000;
                this.active = true;
                this.pulse = 0;
            }
            update(dt, timeScale) {
                this.x += this.vx * timeScale;
                this.y += this.vy * timeScale;
                this.lifetime -= dt * timeScale;
                if (this.lifetime <= 0) this.active = false;
                this.pulse += 0.05 * timeScale;
            }
            draw() {
                ctx.save();
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.info.color;
                ctx.strokeStyle = this.info.color;
                ctx.lineWidth = 2 + Math.sin(this.pulse) * 1;
                
                ctx.beginPath();
                ctx.moveTo(this.x, this.y - this.radius);
                ctx.lineTo(this.x + this.radius, this.y);
                ctx.lineTo(this.x, this.y + this.radius);
                ctx.lineTo(this.x - this.radius, this.y);
                ctx.closePath();
                ctx.stroke();
                
                ctx.fillStyle = `rgba(${hexToRgb(this.info.color)}, 0.2)`;
                ctx.fill();

                ctx.fillStyle = '#fff';
                ctx.font = '16px monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowBlur = 0;
                ctx.fillText(this.info.symbol, this.x, this.y);
                ctx.restore();
            }
        }

        class Enemy {
            constructor() {
                this.spawn();
            }
            spawn() {
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.max(width, height) * 0.7;
                this.x = width / 2 + Math.cos(angle) * distance;
                this.y = height / 2 + Math.sin(angle) * distance;
                
                const types = ['normal', 'normal', 'dodge', 'armored'];
                this.type = types[Math.floor(Math.random() * types.length)];
                this.radius = 16;
                this.baseSpeed = Math.random() * 1.4 + 0.9;
                
                if (this.type === 'normal') {
                    this.color = '#ff3333';
                    this.hp = 1;
                } else if (this.type === 'dodge') {
                    this.color = '#33ccff';
                    this.radius = 13;
                    this.baseSpeed *= 1.4;
                    this.hp = 1;
                } else if (this.type === 'armored') {
                    this.color = '#ffff33';
                    this.radius = 24;
                    this.baseSpeed *= 0.6;
                    this.hp = 2;
                }
                this.speed = this.baseSpeed;
            }
            update(timeScale, isSlowMo, wireX, wireY) {
                const cx = width / 2;
                const cy = height / 2;
                let dx = cx - this.x;
                let dy = cy - this.y;
                const dist = Math.hypot(dx, dy);

                if (dist < this.radius + 30) {
                    game.damageCore(this.type === 'armored' ? 20 : 10);
                    this.hp = 0;
                    return;
                }

                dx /= dist;
                dy /= dist;

                // 아이템: 빙결 효과 적용시 적 속도 10%로 대폭 감속
                let currentSpeed = this.speed;
                if (game.activeEffect && game.activeEffect.id === 'FREEZE') {
                    currentSpeed *= 0.1;
                }

                if (this.type === 'dodge' && isSlowMo) {
                    const nearWire = lineCircleIntersect(cx, cy, wireX, wireY, this.x, this.y, 140);
                    if (nearWire) {
                        this.x += -dy * currentSpeed * 2.2 * timeScale;
                        this.y += dx * currentSpeed * 2.2 * timeScale;
                    }
                }

                this.x += dx * currentSpeed * timeScale;
                this.y += dy * currentSpeed * timeScale;
            }
            draw() {
                ctx.save();
                ctx.shadowBlur = 18;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2;

                // 빙결 상태일 때 적들의 색상을 파랗게 연출
                if (game.activeEffect && game.activeEffect.id === 'FREEZE') {
                    ctx.shadowColor = '#00ccff';
                    ctx.fillStyle = 'rgba(0, 204, 255, 0.5)';
                }

                ctx.beginPath();
                if (this.type === 'normal') {
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fill();
                } else if (this.type === 'dodge') {
                    ctx.moveTo(this.x, this.y - this.radius);
                    ctx.lineTo(this.x + this.radius, this.y + this.radius);
                    ctx.lineTo(this.x - this.radius, this.y + this.radius);
                    ctx.closePath();
                    ctx.fill();
                } else if (this.type === 'armored') {
                    if (this.hp === 2) {
                        ctx.rect(this.x - this.radius, this.y - this.radius, this.radius * 2, this.radius * 2);
                        ctx.fill();
                    } else {
                        ctx.rect(this.x - this.radius, this.y - this.radius, this.radius * 2, this.radius * 2);
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(this.x - this.radius, this.y - this.radius);
                        ctx.lineTo(this.x + this.radius, this.y + this.radius);
                        ctx.moveTo(this.x + this.radius, this.y - this.radius);
                        ctx.lineTo(this.x - this.radius, this.y + this.radius);
                        ctx.stroke();
                    }
                }
                ctx.restore();
            }
        }

        class GameEngine {
            constructor() {
                this.score = 0;
                this.hp = 100;
                this.enemies = [];
                this.particles = [];
                this.floatingTexts = [];
                this.items = [];
                
                this.state = 'START';
                
                this.isDragging = false;
                this.pointerX = 0;
                this.pointerY = 0;
                
                this.timeScale = 1.0;
                this.shakeIntensity = 0;
                this.hitStopFrames = 0;
                
                this.spawnTimer = 0;
                this.spawnInterval = 1400;
                this.difficultyFactor = 1;
                
                this.itemSpawnTimer = 0;
                this.nextItemTime = 10000;
                
                this.activeEffect = null;
                this.effectTimer = 0;

                this.initInput();
                this.loadLeaderboard();
            }
            initInput() {
                const startDrag = (x, y) => {
                    if (this.state !== 'PLAYING') return;
                    sound.init(); 
                    this.isDragging = true;
                    this.pointerX = x;
                    this.pointerY = y;
                };
                const moveDrag = (x, y) => {
                    if (!this.isDragging) return;
                    this.pointerX = x;
                    this.pointerY = y;
                };
                const endDrag = () => {
                    if (!this.isDragging) return;
                    this.isDragging = false;
                    this.triggerSnap();
                };

                window.addEventListener('mousedown', e => startDrag(e.clientX, e.clientY));
                window.addEventListener('mousemove', e => moveDrag(e.clientX, e.clientY));
                window.addEventListener('mouseup', endDrag);

                window.addEventListener('touchstart', e => {
                    if (e.touches.length > 0) startDrag(e.touches[0].clientX, e.touches[0].clientY);
                });
                window.addEventListener('touchmove', e => {
                    if (e.touches.length > 0) moveDrag(e.touches[0].clientX, e.touches[0].clientY);
                });
                window.addEventListener('touchend', endDrag);
            }
            start() {
                sound.init();
                this.score = 0;
                this.hp = 100;
                this.enemies = [];
                this.particles = [];
                this.floatingTexts = [];
                this.items = [];
                this.spawnInterval = 1400;
                this.difficultyFactor = 1;
                this.itemSpawnTimer = 0;
                this.nextItemTime = 8000; // 첫 아이템은 8초 후
                this.activeEffect = null;
                this.effectTimer = 0;
                
                this.state = 'PLAYING';
                
                document.getElementById('startScreen').style.display = 'none';
                document.getElementById('gameOverScreen').style.display = 'none';
                document.getElementById('hud').style.display = 'flex';
                document.getElementById('effectBanner').style.display = 'none';
                this.updateHUD();
            }
            updateHUD() {
                document.getElementById('scoreDisplay').innerText = `SCORE: ${this.score}`;
                document.getElementById('hpDisplay').innerText = `CORE: ${this.hp}%`;
            }
            damageCore(amount) {
                // 방패 아이템 효과 처리
                if (this.activeEffect && this.activeEffect.id === 'SHIELD') {
                    sound.playShieldBlock();
                    this.activeEffect = null; // 1회 방어 후 소멸
                    document.getElementById('effectBanner').style.display = 'none';
                    
                    // 방어 시 파티클 이펙트
                    for (let p = 0; p < 20; p++) {
                        this.particles.push(new Particle(width/2, height/2, '#00ff66', Math.random() * Math.PI * 2));
                    }
                    this.floatingTexts.push(new FloatingText(width/2, height/2 - 40, "BLOCKED!", "#00ff66"));
                    return;
                }

                this.hp -= amount;
                this.shakeIntensity = 22;
                sound.playHurt();
                if (this.hp <= 0) {
                    this.hp = 0;
                    this.gameOver();
                }
                this.updateHUD();
            }
            triggerSnap() {
                const cx = width / 2;
                const cy = height / 2;
                const snapAngle = Math.atan2(this.pointerY - cy, this.pointerX - cx);
                
                sound.playSnap();
                
                // 아이템 타격 체크
                for (let i = this.items.length - 1; i >= 0; i--) {
                    const item = this.items[i];
                    if (lineCircleIntersect(cx, cy, this.pointerX, this.pointerY, item.x, item.y, item.radius + 15)) {
                        this.activeEffect = item.info;
                        this.effectTimer = item.info.duration;
                        sound.playPowerUp();
                        item.active = false;
                        
                        // 아이템 획득 이펙트
                        for (let p = 0; p < 15; p++) {
                            this.particles.push(new Particle(item.x, item.y, item.info.color, snapAngle));
                        }
                        this.floatingTexts.push(new FloatingText(item.x, item.y - 20, item.info.name, item.info.color));
                    }
                }

                // 적 타격 체크
                let killedCount = 0;
                for (let i = this.enemies.length - 1; i >= 0; i--) {
                    const enemy = this.enemies[i];
                    const isHit = lineCircleIntersect(cx, cy, this.pointerX, this.pointerY, enemy.x, enemy.y, enemy.radius + 15);
                    
                    if (isHit) {
                        enemy.hp--;
                        if (enemy.hp <= 0) {
                            killedCount++;
                            sound.playExplode(enemy.type === 'armored');
                            
                            for (let p = 0; p < 24; p++) {
                                this.particles.push(new Particle(enemy.x, enemy.y, enemy.color, snapAngle));
                            }
                            this.enemies.splice(i, 1);
                        } else {
                            const kx = enemy.x - cx;
                            const ky = enemy.y - cy;
                            const kl = Math.hypot(kx, ky);
                            enemy.x += (kx / kl) * 70;
                            enemy.y += (ky / kl) * 70;
                            for (let p = 0; p < 8; p++) {
                                this.particles.push(new Particle(enemy.x, enemy.y, '#ffffff', snapAngle));
                            }
                        }
                    }
                }

                if (killedCount > 0) {
                    this.hitStopFrames = 6;
                    this.shakeIntensity = 8 + killedCount * 5;
                    
                    let comboScore = killedCount * 10 * killedCount;
                    
                    // 더블 스코어 아이템 효과 적용
                    if (this.activeEffect && this.activeEffect.id === 'DOUBLE') {
                        comboScore *= 2;
                    }
                    
                    this.score += comboScore;
                    this.updateHUD();
                    this.floatingTexts.push(new FloatingText(this.pointerX, this.pointerY - 20, `${killedCount} SLICES! +${comboScore}`, '#ffff00'));
                }
            }
            gameOver() {
                this.state = 'GAMEOVER';
                this.isDragging = false;
                document.getElementById('hud').style.display = 'none';
                document.getElementById('effectBanner').style.display = 'none';
                document.getElementById('finalScoreDisplay').innerText = `최종 동기화 점수: ${this.score}`;
                document.getElementById('gameOverScreen').style.display = 'flex';
                this.loadLeaderboard();
                document.getElementById('nicknameInput').focus();
            }
            showStartScreen() {
                this.state = 'START';
                document.getElementById('gameOverScreen').style.display = 'none';
                document.getElementById('startScreen').style.display = 'flex';
                this.loadLeaderboard();
            }
            loadLeaderboard() {
                const scores = JSON.parse(localStorage.getItem('neon_snap_ranks_v2')) || [
                    {name: "RYAN", score: 2800},
                    {name: "CYBER_BLADE", score: 1950},
                    {name: "X_SECURITY", score: 1100}
                ];
                scores.sort((a,b) => b.score - a.score);
                let html = '';
                scores.slice(0, 5).forEach((item, idx) => {
                    html += `<div class="rank-item"><span>${idx+1}. ${item.name}</span><span>${item.score} PTS</span></div>`;
                });
                document.getElementById('startLeaderboard').innerHTML = html;
                document.getElementById('endLeaderboard').innerHTML = html;
            }
            submitScore() {
                let name = document.getElementById('nicknameInput').value.trim().toUpperCase();
                if (!name) name = "OPERATOR";
                const scores = JSON.parse(localStorage.getItem('neon_snap_ranks_v2')) || [];
                scores.push({name: name, score: this.score});
                scores.sort((a,b) => b.score - a.score);
                localStorage.setItem('neon_snap_ranks_v2', JSON.stringify(scores.slice(0, 10)));
                document.getElementById('nicknameInput').value = '';
                this.start();
            }
            update(dt) {
                if (this.hitStopFrames > 0) {
                    this.hitStopFrames--;
                    return;
                }
                this.timeScale = this.isDragging ? 0.10 : 1.0;

                if (this.state === 'PLAYING') {
                    // 적 스폰
                    this.spawnTimer += dt;
                    this.difficultyFactor += 0.00007 * dt;
                    const nextInterval = Math.max(350, this.spawnInterval / Math.min(4, this.difficultyFactor));
                    if (this.spawnTimer >= nextInterval) {
                        this.enemies.push(new Enemy());
                        this.spawnTimer = 0;
                    }
                    
                    // 아이템 스폰 로직
                    this.itemSpawnTimer += dt;
                    if (this.itemSpawnTimer >= this.nextItemTime) {
                        this.items.push(new Item());
                        this.itemSpawnTimer = 0;
                        this.nextItemTime = 12000 + Math.random() * 8000; // 12~20초마다 생성
                    }

                    // 아이템 효과 타이머 및 UI 업데이트
                    if (this.activeEffect) {
                        this.effectTimer -= dt;
                        const banner = document.getElementById('effectBanner');
                        if (this.effectTimer <= 0) {
                            this.activeEffect = null;
                            banner.style.display = 'none';
                        } else {
                            banner.style.display = 'block';
                            banner.innerText = `[${this.activeEffect.name}] ${(this.effectTimer/1000).toFixed(1)}s`;
                            banner.style.color = this.activeEffect.color;
                        }
                    }
                }

                this.enemies.forEach(e => e.update(this.timeScale, this.isDragging, this.pointerX, this.pointerY));
                this.enemies = this.enemies.filter(e => e.hp > 0);

                this.items.forEach(i => i.update(dt, this.timeScale));
                this.items = this.items.filter(i => i.active);

                this.particles.forEach(p => p.update(this.timeScale));
                this.particles = this.particles.filter(p => p.alpha > 0);

                this.floatingTexts.forEach(t => t.update(this.timeScale));
                this.floatingTexts = this.floatingTexts.filter(t => t.alpha > 0);
            }
            render() {
                ctx.clearRect(0, 0, width, height);
                ctx.save();

                if (this.shakeIntensity > 0) {
                    ctx.translate((Math.random() - 0.5) * this.shakeIntensity, (Math.random() - 0.5) * this.shakeIntensity);
                    this.shakeIntensity *= 0.88;
                    if (this.shakeIntensity < 0.3) this.shakeIntensity = 0;
                }

                ctx.strokeStyle = 'rgba(0, 255, 204, 0.03)';
                ctx.lineWidth = 1;
                const gap = 60;
                for (let x = 0; x < width; x += gap) {
                    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, height); ctx.stroke();
                }
                for (let y = 0; y < height; y += gap) {
                    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke();
                }

                const cx = width / 2;
                const cy = height / 2;
                ctx.save();
                ctx.globalCompositeOperation = 'lighter';
                
                // 쉴드 발동 중 코어 이펙트 강화
                if (this.activeEffect && this.activeEffect.id === 'SHIELD') {
                    ctx.shadowBlur = 30;
                    ctx.shadowColor = '#00ff66';
                    ctx.strokeStyle = '#00ff66';
                    ctx.lineWidth = 6;
                    ctx.beginPath();
                    ctx.arc(cx, cy, 35 + Math.sin(Date.now() * 0.01) * 5, 0, Math.PI * 2);
                    ctx.stroke();
                } else {
                    ctx.shadowBlur = 25;
                    ctx.shadowColor = '#00ffcc';
                    ctx.strokeStyle = '#00ffcc';
                    ctx.lineWidth = 4;
                }

                ctx.beginPath();
                ctx.arc(cx, cy, 28, 0, Math.PI * 2);
                ctx.stroke();

                const wave = 16 + Math.sin(Date.now() * 0.008) * 5;
                ctx.fillStyle = 'rgba(0, 255, 204, 0.25)';
                ctx.beginPath();
                ctx.arc(cx, cy, wave, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                if (this.isDragging) {
                    ctx.save();
                    ctx.globalCompositeOperation = 'lighter';
                    ctx.strokeStyle = 'rgba(0, 255, 204, 0.25)';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.arc(cx, cy, Math.hypot(this.pointerX - cx, this.pointerY - cy), 0, Math.PI * 2);
                    ctx.stroke();

                    ctx.lineWidth = 4;
                    ctx.strokeStyle = '#ffff00';
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = '#ffff00';
                    ctx.beginPath();
                    ctx.moveTo(cx, cy);
                    ctx.lineTo(this.pointerX, this.pointerY);
                    ctx.stroke();
                    ctx.restore();
                }

                this.items.forEach(i => i.draw());
                this.particles.forEach(p => p.draw());
                this.enemies.forEach(e => e.draw());
                this.floatingTexts.forEach(t => t.draw());

                ctx.restore();
            }
        }

        const game = new GameEngine();
        let lastTime = performance.now();
        function frame(now) {
            const dt = now - lastTime;
            lastTime = now;
            game.update(dt);
            game.render();
            requestAnimationFrame(frame);
        }
        requestAnimationFrame(frame);
    </script>
</body>
</html>
