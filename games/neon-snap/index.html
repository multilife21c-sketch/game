<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Snap - 탄성 베기</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #030308;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .ui-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: block;
            color: #ffffff;
            text-align: center;
        }
        .screen-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 500px;
            background: rgba(10, 10, 25, 0.85);
            border: 2px solid #00ffcc;
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.2);
            backdrop-filter: blur(8px);
        }
        h1 {
            font-size: 42px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #00ffcc;
            text-shadow: 0 0 15px rgba(0, 255, 204, 0.6);
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 14px;
            color: #8899af;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }
        .btn {
            display: inline-block;
            width: 100%;
            padding: 15px;
            background: transparent;
            border: 2px solid #ff0055;
            color: #ff0055;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 0 10px rgba(255, 0, 85, 0.1);
            margin-top: 15px;
        }
        .btn:hover, .btn:active {
            background: #ff0055;
            color: #fff;
            box-shadow: 0 0 25px rgba(255, 0, 85, 0.6);
            transform: scale(1.02);
        }
        .btn-start {
            border-color: #00ffcc;
            color: #00ffcc;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.1);
        }
        .btn-start:hover, .btn-start:active {
            background: #00ffcc;
            color: #030308;
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.6);
        }
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            z-index: 5;
            pointer-events: none;
            color: #fff;
        }
        .hud-score {
            float: left;
            font-size: 24px;
            font-weight: bold;
            font-family: monospace;
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.4);
        }
        .hud-hp {
            float: right;
            font-size: 20px;
            font-weight: bold;
            color: #ff0055;
            text-shadow: 0 0 10px rgba(255, 0, 85, 0.4);
        }
        .combo-box {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            opacity: 0;
            transition: opacity 0.1s;
            pointer-events: none;
            z-index: 5;
        }
        .combo-text {
            font-size: 36px;
            font-weight: 900;
            color: #ffff00;
            text-shadow: 0 0 15px rgba(255, 255, 0, 0.7);
            animation: pulse 0.2s ease-out;
        }
        @keyframes pulse {
            0% { transform: scale(0.8); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        .leaderboard {
            margin-top: 25px;
            text-align: left;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 15px;
        }
        .leaderboard h3 {
            font-size: 16px;
            color: #ffff00;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .rank-item {
            display: block;
            clear: both;
            font-family: monospace;
            font-size: 14px;
            margin-bottom: 6px;
            color: #e0e0e0;
        }
        .rank-name { float: left; }
        .rank-score { float: right; color: #00ffcc; }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid #ff0055;
            border-radius: 6px;
            color: #fff;
            font-size: 16px;
            text-align: center;
            margin-bottom: 15px;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: #00ffcc;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
        }
        .instructions {
            font-size: 13px;
            color: #a0aec0;
            line-height: 1.6;
            margin-bottom: 25px;
            text-align: left;
            background: rgba(255,255,255,0.02);
            padding: 15px;
            border-radius: 8px;
            border-left: 3px solid #00ffcc;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <!-- HUD -->
    <div id="hud" style="display:none;">
        <div class="hud-score" id="scoreDisplay">SCORE: 0</div>
        <div class="hud-hp" id="hpDisplay">CORE: 100%</div>
    </div>
    
    <div class="combo-box" id="comboContainer">
        <div class="combo-text" id="comboDisplay">3 COMBO!</div>
    </div>

    <!-- START SCREEN -->
    <div id="startScreen" class="ui-screen">
        <div class="screen-content">
            <h1>NEON SNAP</h1>
            <div class="subtitle">TENSION SLICING ACTION</div>
            
            <div class="instructions">
                <strong>💡 플레이 방법:</strong><br>
                1. 화면을 <strong>클릭(터치) 후 드래그</strong>하면 조준선이 생기며 시간이 느려집니다 (불릿 타임).<br>
                2. 조준선을 길게 당겼다가 <strong>손을 떼는 순간(SNAP)</strong>, 강력한 레이저 와이어가 코어로 수축하며 경로 상의 모든 적을 베어버립니다.<br>
                3. 적이 코어에 닿기 전에 파괴하고 멀티 콤보를 달성해 고득점을 노리세요!
            </div>

            <button class="btn btn-start" onclick="game.start()">게임 시작</button>
            
            <div class="leaderboard">
                <h3>🏆 실시간 탑 랭킹</h3>
                <div id="startLeaderboard"></div>
            </div>
        </div>
    </div>

    <!-- GAME OVER SCREEN -->
    <div id="gameOverScreen" class="ui-screen" style="display:none;">
        <div class="screen-content">
            <h1>GAME OVER</h1>
            <div class="subtitle" id="finalScoreDisplay">최종 점수: 0</div>
            
            <input type="text" id="nicknameInput" placeholder="랭킹에 등록할 이름 입력" maxlength="10">
            <button class="btn btn-start" onclick="game.submitScore()">랭킹 등록 및 재시작</button>
            <button class="btn" onclick="game.showStartScreen()">메인 메뉴로</button>

            <div class="leaderboard">
                <h3>🏆 현재 순위</h3>
                <div id="endLeaderboard"></div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 시스템 설정
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // 헬퍼 함수: 선분과 원의 충돌 감지
        function lineCircleIntersect(x1, y1, x2, y2, cx, cy, r) {
            const dx = x2 - x1;
            const dy = y2 - y1;
            const lenSq = dx * dx + dy * dy;
            if (lenSq === 0) return false;

            let t = ((cx - x1) * dx + (cy - y1) * dy) / lenSq;
            t = Math.max(0, Math.min(1, t)); // 선분 내부로 제한

            const closestX = x1 + t * dx;
            const closestY = y1 + t * dy;

            const distSq = (cx - closestX) * (cx - closestX) + (cy - closestY) * (cy - closestY);
            return distSq <= r * r;
        }

        class Particle {
            constructor(x, y, color, angle) {
                this.x = x;
                this.y = y;
                this.color = color;
                const speed = Math.random() * 8 + 4;
                const spread = (Math.random() - 0.5) * 1.5; 
                this.vx = Math.cos(angle + spread) * speed * (Math.random() > 0.5 ? 1 : -1);
                this.vy = Math.sin(angle + spread) * speed * (Math.random() > 0.5 ? 1 : -1);
                this.size = Math.random() * 4 + 2;
                this.alpha = 1;
                this.decay = Math.random() * 0.02 + 0.015;
            }

            update(timeScale) {
                this.x += this.vx * timeScale;
                this.y += this.vy * timeScale;
                this.alpha -= this.decay * timeScale;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        class Enemy {
            constructor() {
                this.spawn();
            }

            spawn() {
                // 화면 밖 무작위 위치에서 생성
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.max(width, height) * 0.6;
                this.x = width / 2 + Math.cos(angle) * distance;
                this.y = height / 2 + Math.sin(angle) * distance;
                
                const types = ['normal', 'normal', 'dodge', 'armored'];
                this.type = types[Math.floor(Math.random() * types.length)];
                
                this.hp = 1;
                this.baseSpeed = Math.random() * 1.2 + 0.8;
                this.radius = 16;
                
                if (this.type === 'normal') {
                    this.color = '#ff3333';
                } else if (this.type === 'dodge') {
                    this.color = '#33ccff';
                    this.radius = 14;
                    this.baseSpeed *= 1.3;
                } else if (this.type === 'armored') {
                    this.color = '#ffff33';
                    this.hp = 2;
                    this.radius = 22;
                    this.baseSpeed *= 0.6;
                }
                this.speed = this.baseSpeed;
            }

            update(timeScale, isSlowMo, wireX, wireY) {
                const targetX = width / 2;
                const targetY = height / 2;
                let dx = targetX - this.x;
                let dy = targetY - this.y;
                const dist = Math.hypot(dx, dy);

                // 코어 도달 판정
                if (dist < this.radius + 25) {
                    game.damageCore(this.type === 'armored' ? 20 : 10);
                    this.hp = 0; // 제거 활성화
                    return;
                }

                dx /= dist;
                dy /= dist;

                // 회피형 적(dodge)의 인공지능: 불릿 타임 중 와이어가 가까워지면 횡이동 시도
                if (this.type === 'dodge' && isSlowMo) {
                    const distToWire = lineCircleIntersect(width/2, height/2, wireX, wireY, this.x, this.y, 100);
                    if (distToWire) {
                        // 코어 방향 수직축으로 회피 속도 추가
                        this.x += -dy * this.speed * 1.5 * timeScale;
                        this.y += dx * this.speed * 1.5 * timeScale;
                    }
                }

                this.x += dx * this.speed * timeScale;
                this.y += dy * this.speed * timeScale;
            }

            draw() {
                ctx.save();
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;

                ctx.beginPath();
                if (this.type === 'normal') {
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fill();
                } else if (this.type === 'dodge') {
                    // 삼각형 모양
                    ctx.moveTo(this.x, this.y - this.radius);
                    ctx.lineTo(this.x + this.radius, this.y + this.radius/2);
                    ctx.lineTo(this.x - this.radius, this.y + this.radius/2);
                    ctx.closePath();
                    ctx.fill();
                } else if (this.type === 'armored') {
                    // 마름모 형태 사각형
                    ctx.rect(this.x - this.radius, this.y - this.radius, this.radius * 2, this.radius * 2);
                    if (this.hp === 2) {
                        ctx.fill();
                    } else {
                        // 피격되어 1HP 남았을 때 테두리와 크랙 연출
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(this.x - this.radius/2, this.y);
                        ctx.lineTo(this.x + this.radius/2, this.y);
                        ctx.stroke();
                    }
                }
                ctx.restore();
            }
        }

        class GameEngine {
            constructor() {
                this.score = 0;
                this.hp = 100;
                this.enemies = [];
                this.particles = [];
                this.state = 'START'; // START, PLAYING, GAMEOVER
                
                // 조작 관련 변수
                this.isDragging = false;
                this.pointerX = 0;
                this.pointerY = 0;
                
                // 쥬스 연출 변수
                this.timeScale = 1.0;
                this.shakeIntensity = 0;
                this.hitStopFrames = 0;
                
                // 난이도 스케일러
                this.spawnTimer = 0;
                this.spawnInterval = 1500; // ms
                this.difficultyFactor = 1;

                this.initInput();
                this.loadLeaderboard();
            }

            initInput() {
                const startDrag = (x, y) => {
                    if (this.state !== 'PLAYING') return;
                    this.isDragging = true;
                    this.pointerX = x;
                    this.pointerY = y;
                };

                const moveDrag = (x, y) => {
                    if (!this.isDragging) return;
                    this.pointerX = x;
                    this.pointerY = y;
                };

                const endDrag = () => {
                    if (!this.isDragging) return;
                    this.isDragging = false;
                    this.triggerSnap();
                };

                // 마우스 이벤트
                window.addEventListener('mousedown', e => startDrag(e.clientX, e.clientY));
                window.addEventListener('mousemove', e => moveDrag(e.clientX, e.clientY));
                window.addEventListener('mouseup', endDrag);

                // 터치 이벤트
                window.addEventListener('touchstart', e => {
                    if (e.touches.length > 0) startDrag(e.touches[0].clientX, e.touches[0].clientY);
                });
                window.addEventListener('touchmove', e => {
                    if (e.touches.length > 0) moveDrag(e.touches[0].clientX, e.touches[0].clientY);
                });
                window.addEventListener('touchend', endDrag);
            }

            start() {
                this.score = 0;
                this.hp = 100;
                this.enemies = [];
                this.particles = [];
                this.spawnInterval = 1500;
                this.difficultyFactor = 1;
                this.state = 'PLAYING';
                
                document.getElementById('startScreen').style.display = 'none';
                document.getElementById('gameOverScreen').style.display = 'none';
                document.getElementById('hud').style.display = 'block';
                document.getElementById('scoreDisplay').innerText = `SCORE: 0`;
                document.getElementById('hpDisplay').innerText = `CORE: 100%`;
            }

            damageCore(amount) {
                this.hp -= amount;
                this.shakeIntensity = 15; // 코어 타격 시 화면 흔들림
                if (this.hp <= 0) {
                    this.hp = 0;
                    this.gameOver();
                }
                document.getElementById('hpDisplay').innerText = `CORE: ${this.hp}%`;
            }

            triggerSnap() {
                const cx = width / 2;
                const cy = height / 2;
                
                // 스냅 라인 벡터의 각도 계산
                const snapAngle = Math.atan2(this.pointerY - cy, this.pointerX - cx);
                
                let killedCount = 0;

                // 스냅 범위 내 적 충돌 계산
                for (let i = this.enemies.length - 1; i >= 0; i--) {
                    const enemy = this.enemies[i];
                    const isHit = lineCircleIntersect(cx, cy, this.pointerX, this.pointerY, enemy.x, enemy.y, enemy.radius + 10);
                    
                    if (isHit) {
                        enemy.hp--;
                        if (enemy.hp <= 0) {
                            // 완전히 처치됨
                            killedCount++;
                            // 국소 파티클 생성
                            for (let p = 0; p < 15; p++) {
                                this.particles.push(new Particle(enemy.x, enemy.y, enemy.color, snapAngle));
                            }
                            this.enemies.splice(i, 1);
                        } else {
                            // 아머드 적 체력 감소 시 넉백 및 임팩트 파티클
                            const kx = enemy.x - cx;
                            const ky = enemy.y - cy;
                            const kl = Math.hypot(kx, ky);
                            enemy.x += (kx / kl) * 50; 
                            enemy.y += (ky / kl) * 50;
                            enemy.speed = enemy.baseSpeed * 1.5; // 일시적 폭주 속도
                            for (let p = 0; p < 5; p++) {
                                this.particles.push(new Particle(enemy.x, enemy.y, '#ffffff', snapAngle));
                            }
                        }
                    }
                }

                // 콤보 및 주스 이펙트 적용
                if (killedCount > 0) {
                    this.hitStopFrames = 5; // 히트 스톱 프레임 설정
                    this.shakeIntensity = 5 + killedCount * 4; // 멀티킬일수록 더 강하게 흔들림
                    
                    // 점수 계산 (기하급수 콤보 배율)
                    const gainScore = killedCount * 10 * killedCount;
                    this.score += gainScore;
                    document.getElementById('scoreDisplay').innerText = `SCORE: ${this.score}`;

                    if (killedCount >= 2) {
                        this.showCombo(killedCount);
                    }
                }
            }

            showCombo(count) {
                const container = document.getElementById('comboContainer');
                const display = document.getElementById('comboDisplay');
                display.innerText = `${count} SLICES! (+${count * 10 * count})`;
                container.style.opacity = '1';
                
                if (this.comboTimeout) clearTimeout(this.comboTimeout);
                this.comboTimeout = setTimeout(() => {
                    container.style.opacity = '0';
                }, 800);
            }

            gameOver() {
                this.state = 'GAMEOVER';
                this.isDragging = false;
                document.getElementById('hud').style.display = 'none';
                document.getElementById('finalScoreDisplay').innerText = `최종 점수: ${this.score}`;
                document.getElementById('gameOverScreen').style.display = 'block';
                this.loadLeaderboard();
                document.getElementById('nicknameInput').focus();
            }

            showStartScreen() {
                this.state = 'START';
                document.getElementById('gameOverScreen').style.display = 'none';
                document.getElementById('startScreen').style.display = 'block';
                this.loadLeaderboard();
            }

            loadLeaderboard() {
                const scores = JSON.parse(localStorage.getItem('neon_snap_ranks')) || [
                    {name: "RYAN", score: 1500},
                    {name: "CYBER_ACE", score: 1200},
                    {name: "NEON_BLADE", score: 800},
                    {name: "GUEST_01", score: 300}
                ];
                
                // 내림차순 정렬
                scores.sort((a,b) => b.score - a.score);
                
                let html = '';
                scores.slice(0, 5).forEach((item, idx) => {
                    html += `<div class="rank-item">
                        <span class="rank-name">${idx+1}. ${item.name}</span>
                        <span class="rank-score">${item.score} pts</span>
                    </div>`;
                });

                document.getElementById('startLeaderboard').innerHTML = html;
                document.getElementById('endLeaderboard').innerHTML = html;
            }

            submitScore() {
                let name = document.getElementById('nicknameInput').value.trim().toUpperCase();
                if (!name) name = "PLAYER";
                
                const scores = JSON.parse(localStorage.getItem('neon_snap_ranks')) || [
                    {name: "RYAN", score: 1500},
                    {name: "CYBER_ACE", score: 1200}
                ];

                scores.push({name: name, score: this.score});
                scores.sort((a,b) => b.score - a.score);
                localStorage.setItem('neon_snap_ranks', JSON.stringify(scores.slice(0, 10)));
                
                document.getElementById('nicknameInput').value = '';
                this.start();
            }

            update(dt) {
                // 히트 스톱 상태에서는 렌더링만 유지하고 상태 업데이트를 잠시 중단
                if (this.hitStopFrames > 0) {
                    this.hitStopFrames--;
                    return;
                }

                // 타임 스케일 결정 (불릿 타임 모드 전환)
                this.timeScale = this.isDragging ? 0.12 : 1.0;

                // 적 스폰 로직
                if (this.state === 'PLAYING') {
                    this.spawnTimer += dt;
                    // 난이도 상승 곡선 (시간이 지날수록 스폰 주기 감소)
                    this.difficultyFactor += 0.00005 * dt;
                    const currentInterval = Math.max(400, this.spawnInterval / Math.min(3, this.difficultyFactor));
                    
                    if (this.spawnTimer >= currentInterval) {
                        this.enemies.push(new Enemy());
                        this.spawnTimer = 0;
                    }
                }

                // 객체 업데이트
                this.enemies.forEach(enemy => enemy.update(this.timeScale, this.isDragging, this.pointerX, this.pointerY));
                this.enemies = this.enemies.filter(enemy => enemy.hp > 0);

                this.particles.forEach(p => p.update(this.timeScale));
                this.particles = this.particles.filter(p => p.alpha > 0);
            }

            render() {
                ctx.clearRect(0, 0, width, height);
                
                ctx.save();
                // 스크린 쉐이크 연출 적용
                if (this.shakeIntensity > 0) {
                    const sx = (Math.random() - 0.5) * this.shakeIntensity;
                    const sy = (Math.random() - 0.5) * this.shakeIntensity;
                    ctx.translate(sx, sy);
                    this.shakeIntensity *= 0.9; // 부드러운 감쇄 효과
                    if (this.shakeIntensity < 0.2) this.shakeIntensity = 0;
                }

                // 배경 격자(Grid) 연출
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.02)';
                ctx.lineWidth = 1;
                const gridSize = 50;
                for (let x = 0; x < width; x += gridSize) {
                    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, height); ctx.stroke();
                }
                for (let y = 0; y < height; y += gridSize) {
                    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke();
                }

                // 중앙 코어 그리기
                const cx = width / 2;
                const cy = height / 2;
                ctx.save();
                ctx.globalCompositeOperation = 'lighter';
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#00ffcc';
                ctx.strokeStyle = '#00ffcc';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(cx, cy, 25, 0, Math.PI * 2);
                ctx.stroke();
                // 안쪽 맥박 뛰는 핵 연출
                const pulse = 15 + Math.sin(Date.now() * 0.006) * 4;
                ctx.fillStyle = 'rgba(0, 255, 204, 0.3)';
                ctx.beginPath();
                ctx.arc(cx, cy, pulse, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                // 조준 텐션 와이어 그리기 (드래그 중일 때)
                if (this.isDragging) {
                    ctx.save();
                    ctx.globalCompositeOperation = 'lighter';
                    ctx.lineWidth = 2;
                    ctx.strokeStyle = 'rgba(0, 255, 204, 0.4)';
                    // 가이드 외곽 원형 반경 선형 연출
                    ctx.beginPath();
                    ctx.arc(cx, cy, Math.hypot(this.pointerX - cx, this.pointerY - cy), 0, Math.PI * 2);
                    ctx.stroke();

                    // 핵심 고무줄 와이어 선
                    ctx.lineWidth = 4;
                    ctx.strokeStyle = '#ffff00';
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#ffff00';
                    ctx.beginPath();
                    ctx.moveTo(cx, cy);
                    ctx.lineTo(this.pointerX, this.pointerY);
                    ctx.stroke();
                    ctx.restore();
                }

                // 객체들 렌더링
                this.particles.forEach(p => p.draw());
                this.enemies.forEach(enemy => enemy.draw());

                ctx.restore();
            }
        }

        // 엔진 초기화 및 루프 실행
        const game = new GameEngine();
        let lastTime = performance.now();

        function loop(now) {
            const dt = now - lastTime;
            lastTime = now;

            game.update(dt);
            game.render();

            requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);
    </script>
</body>
</html>
