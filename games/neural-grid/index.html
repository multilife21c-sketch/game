<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neural Grid: Zero Hour</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<style>
  :root {
    --bg0: #04070a; --panel: rgba(17, 29, 49, 0.75); --border2: #2c4060;
    --txt: #e6ecf7; --amber: #ffb547; --cyan: #22d3ee; --magenta: #ff5c8a;
    --fdisp: 'Orbitron', sans-serif; --fkr: 'Noto Sans KR', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
  body { 
    background: var(--bg0); color: var(--txt); 
    font-family: var(--fkr); display: flex; 
    justify-content: center; align-items: center; 
    height: 100vh; overflow: hidden;
  }
  #game-container {
    position: relative; width: 1024px; height: 576px;
    background: #000; border: 2px solid var(--cyan);
    box-shadow: 0 0 50px rgba(34, 211, 238, 0.2); border-radius: 8px; overflow: hidden;
  }
  
  /* 3D Canvas */
  #webgl-canvas { display: block; width: 100%; height: 100%; }

  /* Hologram UI Overlay */
  #ui-layer {
    position: absolute; inset: 0; pointer-events: none;
    display: flex; flex-direction: column; justify-content: space-between; padding: 30px;
  }
  
  .header { display: flex; justify-content: space-between; align-items: flex-start; }
  .title-box {
    background: var(--panel); border: 1px solid var(--cyan); padding: 15px 30px;
    border-radius: 4px; backdrop-filter: blur(10px); box-shadow: 0 0 20px rgba(34,211,238,0.2);
  }
  .title { font-family: var(--fdisp); font-size: 28px; font-weight: 900; color: #fff; letter-spacing: 2px; text-shadow: 0 0 10px var(--cyan); }
  .subtitle { font-size: 12px; color: var(--cyan); letter-spacing: 5px; margin-top: 5px; }
  
  .status-box {
    background: var(--panel); border: 1px solid var(--magenta); padding: 15px 25px;
    border-radius: 4px; backdrop-filter: blur(10px); text-align: right;
  }
  .timer { font-family: var(--fdisp); font-size: 36px; font-weight: 900; color: var(--amber); text-shadow: 0 0 15px var(--amber); }
  .status-label { font-size: 11px; color: var(--magenta); letter-spacing: 1px; }

  /* Controls (Pointer events enabled for buttons) */
  .footer { display: flex; justify-content: space-between; align-items: flex-end; pointer-events: auto; }
  
  .avatar-select { display: flex; gap: 15px; }
  .avatar-btn {
    background: rgba(0,0,0,0.6); border: 1px solid var(--border2); padding: 10px 20px;
    color: var(--txt); font-family: var(--fdisp); font-size: 14px; font-weight: 700;
    cursor: pointer; border-radius: 4px; transition: all 0.2s;
  }
  .avatar-btn:hover, .avatar-btn.active {
    background: rgba(34,211,238,0.2); border-color: var(--cyan); color: var(--cyan);
    box-shadow: 0 0 15px rgba(34,211,238,0.4);
  }

  .action-btn {
    background: var(--cyan); color: #000; border: none; padding: 15px 40px;
    font-family: var(--fdisp); font-size: 20px; font-weight: 900; cursor: pointer;
    border-radius: 4px; box-shadow: 0 0 20px rgba(34,211,238,0.6); transition: all 0.2s;
  }
  .action-btn:hover { transform: scale(1.05); background: #fff; box-shadow: 0 0 30px #fff; }

  .instruction {
    position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.6); font-size: 13px; letter-spacing: 1px; text-align: center;
  }
</style>
</head>
<body>

<div id="game-container">
  <canvas id="webgl-canvas"></canvas>

  <div id="ui-layer">
    <div class="header">
      <div class="title-box">
        <div class="title">NEURAL GRID</div>
        <div class="subtitle">PROJECT: ZERO HOUR</div>
      </div>
      <div class="status-box">
        <div class="status-label">SYSTEM COMPROMISE IN</div>
        <div class="timer">02:59:99</div>
      </div>
    </div>
    
    <div class="instruction">
      마우스를 드래그하여 3D 그리드를 회전시키거나 휠로 확대/축소하세요.<br>
      (모바일: 터치 스와이프 및 핀치 줌)
    </div>

    <div class="footer">
      <div class="avatar-select">
        <button class="avatar-btn active" onclick="selectAvatar(this, 0x22d3ee)">CIPHER</button>
        <button class="avatar-btn" onclick="selectAvatar(this, 0xff5c8a)">GLITCH</button>
        <button class="avatar-btn" onclick="selectAvatar(this, 0x00e5a0)">ECHO</button>
      </div>
      <button class="action-btn" onclick="startInfiltration()">INFILTRATE</button>
    </div>
  </div>
</div>

<script>
  // ==========================================
  // Three.js 코어 3D 엔진 설정
  // ==========================================
  const canvas = document.getElementById('webgl-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setSize(1024, 576);
  renderer.setPixelRatio(window.devicePixelRatio);

  const scene = new THREE.Scene();
  // 사이버펑크 느낌의 짙은 안개
  scene.fog = new THREE.FogExp2(0x04070a, 0.03);

  const camera = new THREE.PerspectiveCamera(45, 1024 / 576, 0.1, 1000);
  camera.position.set(12, 10, 15);

  // 마우스/터치 컨트롤 (OrbitControls)
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.autoRotate = true; // 천천히 자동 회전
  controls.autoRotateSpeed = 0.5;

  // 조명 설정
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
  scene.add(ambientLight);
  const pointLight = new THREE.PointLight(0x22d3ee, 2, 50);
  pointLight.position.set(0, 0, 0);
  scene.add(pointLight);

  // ==========================================
  // 뉴럴 그리드 (3D 미로 노드) 생성 로직
  // ==========================================
  const gridGroup = new THREE.Group();
  scene.add(gridGroup);

  // 큐브(노드) 재질 설정 - 글래스모피즘 홀로그램 느낌
  let currentGridColor = 0x22d3ee;
  const nodeGeometry = new THREE.BoxGeometry(1, 1, 1);
  const nodeMaterial = new THREE.MeshPhysicalMaterial({
    color: currentGridColor,
    transparent: true,
    opacity: 0.15,
    wireframe: true,
    emissive: currentGridColor,
    emissiveIntensity: 0.8,
    roughness: 0.1,
    metalness: 0.8
  });

  // 코어(중심) 재질
  const coreMaterial = new THREE.MeshPhysicalMaterial({
    color: 0xffffff,
    emissive: 0xffffff,
    emissiveIntensity: 1,
    transparent: true,
    opacity: 0.9
  });

  // 5x5x5 구조로 미로 뼈대 생성
  const gridSize = 2; // -2, 0, 2
  const spacing = 2.5;

  for (let x = -gridSize; x <= gridSize; x++) {
    for (let y = -gridSize; y <= gridSize; y++) {
      for (let z = -gridSize; z <= gridSize; z++) {
        // 일부 노드는 비워서 미로 구조 형성 (무작위성)
        if (Math.random() > 0.4 && !(x===0 && y===0 && z===0)) continue;

        const isCore = (x === 0 && y === 0 && z === 0);
        const node = new THREE.Mesh(nodeGeometry, isCore ? coreMaterial : nodeMaterial);
        
        node.position.set(x * spacing, y * spacing, z * spacing);
        
        // 크기 랜덤화로 디지털적인 불규칙성 부여
        if(!isCore) {
            const scale = 0.3 + Math.random() * 0.5;
            node.scale.set(scale, scale, scale);
        }
        
        gridGroup.add(node);
      }
    }
  }

  // ==========================================
  // 애니메이션 루프
  // ==========================================
  const clock = new THREE.Clock();

  function animate() {
    requestAnimationFrame(animate);
    const time = clock.getElapsedTime();

    // 전체 그리드가 숨쉬듯 부유하는 애니메이션
    gridGroup.position.y = Math.sin(time * 0.5) * 0.5;
    
    // 조명 색상 지속적 변화 (사이버펑크 효과)
    pointLight.intensity = 1.5 + Math.sin(time * 2) * 0.5;

    controls.update();
    renderer.render(scene, camera);
  }
  animate();

  // ==========================================
  // UI 인터랙션 함수
  // ==========================================
  function selectAvatar(btn, hexColor) {
    // 버튼 UI 업데이트
    document.querySelectorAll('.avatar-btn').forEach(el => el.classList.remove('active'));
    btn.classList.add('active');

    // 3D 그리드 색상 실시간 변경
    currentGridColor = hexColor;
    nodeMaterial.color.setHex(hexColor);
    nodeMaterial.emissive.setHex(hexColor);
    pointLight.color.setHex(hexColor);
    
    // 메인 포인트 색상도 변경 (버튼 등)
    document.documentElement.style.setProperty('--cyan', '#' + hexColor.toString(16).padStart(6, '0'));
  }

  function startInfiltration() {
    alert("시스템 침투 준비 완료! (다음 단계에서 노드 클릭 및 해킹 로직이 추가됩니다.)");
    controls.autoRotateSpeed = 10.0; // 침투 시 빠르게 회전하는 연출
    setTimeout(() => { controls.autoRotateSpeed = 0.5; }, 2000);
  }
</script>
</body>
</html>
