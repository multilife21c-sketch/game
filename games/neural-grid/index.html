<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neural Grid: Zero Hour</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<style>
  :root {
    --bg0: #04070a; --panel: rgba(17, 29, 49, 0.75); --border2: #2c4060;
    --txt: #e6ecf7; --amber: #ffb547; --cyan: #22d3ee; --magenta: #ff5c8a;
    --fdisp: 'Orbitron', sans-serif; --fkr: 'Noto Sans KR', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
  body { background: var(--bg0); color: var(--txt); font-family: var(--fkr); display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
  
  #game-container { position: relative; width: 1024px; height: 576px; background: #000; border: 2px solid var(--cyan); box-shadow: 0 0 50px rgba(34, 211, 238, 0.2); border-radius: 8px; overflow: hidden; }
  #webgl-canvas { display: block; width: 100%; height: 100%; }

  #ui-layer { position: absolute; inset: 0; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 30px; }
  .header { display: flex; justify-content: space-between; align-items: flex-start; }
  .title-box { background: var(--panel); border: 1px solid var(--cyan); padding: 15px 30px; border-radius: 4px; backdrop-filter: blur(10px); box-shadow: 0 0 20px rgba(34,211,238,0.2); transition: all 0.3s; }
  .title { font-family: var(--fdisp); font-size: 28px; font-weight: 900; color: #fff; letter-spacing: 2px; text-shadow: 0 0 10px var(--cyan); }
  .subtitle { font-size: 12px; color: var(--cyan); letter-spacing: 5px; margin-top: 5px; }
  
  .status-box { background: var(--panel); border: 1px solid var(--magenta); padding: 15px 25px; border-radius: 4px; backdrop-filter: blur(10px); text-align: right; }
  .timer { font-family: var(--fdisp); font-size: 36px; font-weight: 900; color: var(--amber); text-shadow: 0 0 15px var(--amber); font-variant-numeric: tabular-nums; }
  .status-label { font-size: 13px; color: var(--magenta); letter-spacing: 1px; font-weight: 700; margin-bottom: 5px; }

  .footer { display: flex; justify-content: space-between; align-items: flex-end; pointer-events: auto; }
  .avatar-select { display: flex; gap: 15px; }
  .avatar-btn { background: rgba(0,0,0,0.6); border: 1px solid var(--border2); padding: 10px 20px; color: var(--txt); font-family: var(--fdisp); font-size: 14px; font-weight: 700; cursor: pointer; border-radius: 4px; transition: all 0.2s; }
  .avatar-btn:hover, .avatar-btn.active { background: rgba(34,211,238,0.2); border-color: var(--cyan); color: var(--cyan); box-shadow: 0 0 15px rgba(34,211,238,0.4); }
  .action-btn { background: var(--cyan); color: #000; border: none; padding: 15px 40px; font-family: var(--fdisp); font-size: 20px; font-weight: 900; cursor: pointer; border-radius: 4px; box-shadow: 0 0 20px rgba(34,211,238,0.6); transition: all 0.2s; }
  .action-btn:hover { transform: scale(1.05); background: #fff; box-shadow: 0 0 30px #fff; }

  .instruction { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.8); font-size: 14px; letter-spacing: 1px; text-align: center; background: rgba(0,0,0,0.5); padding: 15px 25px; border-radius: 8px; border: 1px solid var(--border2); pointer-events: none; transition: opacity 0.3s; }
  
  /* Result Screen */
  #result-screen { position: absolute; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 30; pointer-events: auto; }
  .result-title { font-family: var(--fdisp); font-size: 50px; font-weight: 900; color: var(--cyan); text-shadow: 0 0 20px var(--cyan); margin-bottom: 10px; }
  .result-score { font-family: var(--fdisp); font-size: 30px; color: #fff; margin-bottom: 40px; }
  .restart-btn { background: transparent; border: 2px solid var(--amber); color: var(--amber); padding: 15px 40px; font-family: var(--fdisp); font-size: 18px; font-weight: 700; cursor: pointer; border-radius: 4px; transition: all 0.2s; }
  .restart-btn:hover { background: var(--amber); color: #000; box-shadow: 0 0 20px var(--amber); }

  /* Crosshair */
  #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; display: none; }
</style>
</head>
<body>

<div id="game-container">
  <canvas id="webgl-canvas"></canvas>
  <div id="crosshair"></div>

  <div id="ui-layer">
    <div class="header">
      <div class="title-box" id="title-box">
        <div class="title">NEURAL GRID</div>
        <div class="subtitle">PROJECT: ZERO HOUR</div>
      </div>
      <div class="status-box">
        <div class="status-label" id="keys-ui">SECURITY KEYS: 0 / 2</div>
        <div class="timer" id="timer-ui">01:00:00</div>
      </div>
    </div>
    
    <div class="instruction" id="instruction-text">
      아바타를 선택하고 [INFILTRATE]를 눌러 침투를 시작하세요.<br>
      <span style="color:var(--amber); font-size:12px;">마우스/터치로 맵을 회전할 수 있습니다.</span>
    </div>

    <div class="footer" id="footer-menu">
      <div class="avatar-select">
        <button class="avatar-btn active" onclick="selectAvatar(this, 0x22d3ee)">CIPHER</button>
        <button class="avatar-btn" onclick="selectAvatar(this, 0xff5c8a)">GLITCH</button>
        <button class="avatar-btn" onclick="selectAvatar(this, 0x00e5a0)">ECHO</button>
      </div>
      <button class="action-btn" onclick="startGame()">INFILTRATE</button>
    </div>
  </div>

  <div id="result-screen">
    <div class="result-title" id="result-msg">SYSTEM COMPROMISED</div>
    <div class="result-score" id="result-score">SCORE: 0</div>
    <button class="restart-btn" onclick="location.reload()">RETURN TO LOBBY</button>
  </div>
</div>

<script>
  // ==========================================
  // 1. 코어 엔진 및 렌더러 설정
  // ==========================================
  const canvas = document.getElementById('webgl-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setSize(1024, 576);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x04070a, 0.035);

  const camera = new THREE.PerspectiveCamera(45, 1024 / 576, 0.1, 1000);
  camera.position.set(12, 10, 15);

  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true; controls.dampingFactor = 0.05;
  controls.autoRotate = true; controls.autoRotateSpeed = 1.0;

  const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
  scene.add(ambientLight);
  const pointLight = new THREE.PointLight(0x22d3ee, 2, 60);
  pointLight.position.set(0, 0, 0);
  scene.add(pointLight);

  // ==========================================
  // 2. 게임 변수 및 상호작용 설정
  // ==========================================
  let gameStatus = 'menu'; // 'menu', 'playing', 'ended'
  let currentGridColor = 0x22d3ee;
  let timeRemaining = 60;
  let timerInterval;
  let keysRequired = 2;
  let keysFound = 0;

  const gridGroup = new THREE.Group();
  scene.add(gridGroup);
  
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  
  const gridSize = 2; // -2, -1, 0, 1, 2 (5x5x5 Grid)
  const spacing = 2.5;
  const nodeGeometry = new THREE.BoxGeometry(1, 1, 1);

  // ==========================================
  // 3. 퍼즐 맵(그리드) 생성 로직
  // ==========================================
  function generateGrid() {
    // 기존 노드 초기화
    while(gridGroup.children.length > 0){ gridGroup.remove(gridGroup.children[0]); }
    
    let normalNodes = [];

    for (let x = -gridSize; x <= gridSize; x++) {
      for (let y = -gridSize; y <= gridSize; y++) {
        for (let z = -gridSize; z <= gridSize; z++) {
          const isCore = (x === 0 && y === 0 && z === 0);
          const isStart = (x === -gridSize && y === -gridSize && z === -gridSize);
          
          let nodeType = 'normal';
          if (isCore) nodeType = 'core';
          else if (isStart) nodeType = 'start';
          // 25% 확률로 길을 막는 방어벽(Firewall) 생성
          else if (Math.random() < 0.25) nodeType = 'firewall';

          const nodeMaterial = new THREE.MeshPhysicalMaterial({ transparent: true });
          const node = new THREE.Mesh(nodeGeometry, nodeMaterial);
          
          node.position.set(x * spacing, y * spacing, z * spacing);
          node.userData = { gx: x, gy: y, gz: z, type: nodeType, isHacked: false };
          
          if(nodeType === 'normal') normalNodes.push(node);
          
          applyNodeStyle(node);
          gridGroup.add(node);
        }
      }
    }

    // 보안 키(Key) 2개 무작위 배치
    for(let i=0; i<keysRequired; i++) {
      if(normalNodes.length > 0) {
        const idx = Math.floor(Math.random() * normalNodes.length);
        const keyNode = normalNodes.splice(idx, 1)[0];
        keyNode.userData.type = 'key';
        applyNodeStyle(keyNode);
      }
    }
  }

  function applyNodeStyle(node) {
    const mat = node.material;
    const type = node.userData.type;
    const isHacked = node.userData.isHacked;

    if (type === 'core') {
      mat.color.setHex(0xffffff); mat.emissive.setHex(0xffffff); mat.opacity = 0.9;
      mat.roughness = 0.1; mat.metalness = 1.0;
      node.scale.set(1.3, 1.3, 1.3);
    } else if (type === 'firewall') {
      mat.color.setHex(0xff003c); mat.emissive.setHex(0xff003c); mat.opacity = 0.8;
      mat.wireframe = false;
      node.scale.set(0.7, 0.7, 0.7);
    } else if (type === 'key') {
      mat.color.setHex(0xffb547); mat.emissive.setHex(0xffb547); mat.opacity = 0.9;
      mat.wireframe = false;
      node.scale.set(0.8, 0.8, 0.8);
    } else if (type === 'start' || isHacked) {
      mat.color.setHex(currentGridColor); mat.emissive.setHex(currentGridColor); mat.opacity = 0.85;
      mat.wireframe = false;
      node.userData.isHacked = true;
      node.scale.set(0.9, 0.9, 0.9);
    } else {
      // 일반 해킹 안된 노드
      mat.color.setHex(currentGridColor); mat.emissive.setHex(currentGridColor); mat.opacity = 0.15;
      mat.wireframe = true;
      node.scale.set(0.6, 0.6, 0.6);
    }
  }

  generateGrid(); // 초기 관전용 생성

  // ==========================================
  // 4. 이벤트: 클릭(해킹) 및 렌더링
  // ==========================================
  canvas.addEventListener('pointerdown', (e) => {
    if (gameStatus !== 'playing') return;

    // 캔버스 좌표계 보정 (Raycasting)
    const rect = canvas.getBoundingClientRect();
    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(gridGroup.children);

    if (intersects.length > 0) {
      processHackAttempt(intersects[0].object);
    }
  });

  function processHackAttempt(node) {
    if (node.userData.isHacked || node.userData.type === 'firewall') {
      flashError(node); return;
    }

    // 인접성 검사 (상하좌우 및 앞뒤 십자 방향만 가능)
    let isAdjacent = false;
    for (let other of gridGroup.children) {
      if (other.userData.isHacked) {
        const dx = Math.abs(node.userData.gx - other.userData.gx);
        const dy = Math.abs(node.userData.gy - other.userData.gy);
        const dz = Math.abs(node.userData.gz - other.userData.gz);
        if (dx + dy + dz === 1) { isAdjacent = true; break; }
      }
    }

    if (!isAdjacent) { flashError(node); return; }

    // 노드 해킹 처리
    if (node.userData.type === 'core') {
      if (keysFound >= keysRequired) endGame(true);
      else flashError(node); // 키가 부족하면 코어 거부
    } else {
      if (node.userData.type === 'key') {
        keysFound++;
        document.getElementById('keys-ui').innerText = `SECURITY KEYS: ${keysFound} / 2`;
        document.getElementById('keys-ui').style.color = '#00e5a0'; // 진행 시 초록색 피드백
      }
      
      // 해킹 성공 시각 효과
      node.userData.isHacked = true;
      applyNodeStyle(node);
      
      // 약간의 튀어오르는 스케일 애니메이션 효과
      const originalScale = node.scale.x;
      node.scale.set(originalScale * 1.5, originalScale * 1.5, originalScale * 1.5);
      setTimeout(() => node.scale.set(originalScale, originalScale, originalScale), 150);
    }
  }

  function flashError(node) {
    const origColor = node.material.color.getHex();
    const origEmissive = node.material.emissive.getHex();
    node.material.color.setHex(0xff0000); node.material.emissive.setHex(0xff0000);
    setTimeout(() => {
      node.material.color.setHex(origColor); node.material.emissive.setHex(origEmissive);
    }, 150);
  }

  const clock = new THREE.Clock();
  function animate() {
    requestAnimationFrame(animate);
    const time = clock.getElapsedTime();

    // 부유 애니메이션 및 맥박 치는 조명
    gridGroup.position.y = Math.sin(time * 1.5) * 0.2;
    pointLight.intensity = 1.5 + Math.sin(time * 3) * 0.5;

    // 코어 회전 연출
    gridGroup.children.forEach(node => {
      if(node.userData.type === 'core') {
        node.rotation.x += 0.01; node.rotation.y += 0.01;
      }
      if(node.userData.type === 'key' && !node.userData.isHacked) {
        node.rotation.z = Math.sin(time * 5) * 0.5; // 키는 흔들림
      }
    });

    controls.update();
    renderer.render(scene, camera);
  }
  animate();

  // ==========================================
  // 5. 게임 흐름 제어 및 UI
  // ==========================================
  function selectAvatar(btn, hexColor) {
    if(gameStatus !== 'menu') return;
    document.querySelectorAll('.avatar-btn').forEach(el => el.classList.remove('active'));
    btn.classList.add('active');

    currentGridColor = hexColor;
    pointLight.color.setHex(hexColor);
    document.documentElement.style.setProperty('--cyan', '#' + hexColor.toString(16).padStart(6, '0'));
    document.getElementById('title-box').style.borderColor = '#' + hexColor.toString(16).padStart(6, '0');

    // 기존 맵 색상 업데이트
    gridGroup.children.forEach(node => {
      if (node.userData.type === 'normal' || node.userData.isHacked) applyNodeStyle(node);
    });
  }

  function startGame() {
    gameStatus = 'playing';
    keysFound = 0;
    timeRemaining = 60;
    
    document.getElementById('footer-menu').style.display = 'none';
    document.getElementById('instruction-text').innerHTML = `인접한 노드를 클릭해 해킹을 확산시키세요.<br><span style="color:var(--magenta)">방어벽(빨강)</span>을 피해 <span style="color:var(--amber)">보안키(노랑)</span> 2개를 획득 후 <span style="color:#fff">코어(중앙)</span>를 장악하세요!`;
    document.getElementById('keys-ui').innerText = `SECURITY KEYS: 0 / 2`;
    document.getElementById('keys-ui').style.color = 'var(--magenta)';
    document.getElementById('crosshair').style.display = 'block';

    generateGrid(); // 새로운 랜덤 맵 생성
    controls.autoRotateSpeed = 0.2; // 플레이 중에는 덜 회전하도록 조절

    // 타이머 시작
    timerInterval = setInterval(() => {
      timeRemaining--;
      document.getElementById('timer-ui').innerText = `00:00:${timeRemaining.toString().padStart(2, '0')}`;
      if (timeRemaining <= 0) endGame(false);
    }, 1000);
  }

  function endGame(isWin) {
    gameStatus = 'ended';
    clearInterval(timerInterval);
    document.getElementById('crosshair').style.display = 'none';
    
    const resultScreen = document.getElementById('result-screen');
    const resultMsg = document.getElementById('result-msg');
    const resultScore = document.getElementById('result-score');
    
    resultScreen.style.display = 'flex';
    
    if (isWin) {
      const finalScore = timeRemaining * 150 + 5000; // 남은 시간 비례 점수
      resultMsg.innerText = "SYSTEM COMPROMISED";
      resultMsg.style.color = "var(--green)";
      resultMsg.style.textShadow = "0 0 20px var(--green)";
      resultScore.innerText = `FINAL SCORE: ${finalScore}`;
      
      // NOVA 포털 랭킹 연동
      if (typeof window.reportScore === 'function') window.reportScore(finalScore);
    } else {
      resultMsg.innerText = "INFILTRATION FAILED";
      resultMsg.style.color = "var(--magenta)";
      resultMsg.style.textShadow = "0 0 20px var(--magenta)";
      resultScore.innerText = "TIME OUT / SECURITY LOCKDOWN";
    }
  }
</script>
</body>
</html>
