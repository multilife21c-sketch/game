<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Fighters - NOVA ARCADE</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg0: #070b14; --panel: #111d31; --border2: #2c4060;
    --txt: #e6ecf7; --amber: #ffb547; --cyan: #22d3ee; --magenta: #ff5c8a;
    --fdisp: 'Orbitron', sans-serif; --fkr: 'Noto Sans KR', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    background: var(--bg0); color: var(--txt); 
    font-family: var(--fkr); display: flex; 
    justify-content: center; align-items: center; 
    height: 100vh; overflow: hidden;
  }
  
  #game-container {
    position: relative; width: 1024px; height: 576px;
    background: #0d1626; border: 2px solid var(--border2);
    box-shadow: 0 0 30px rgba(34, 211, 238, 0.1);
  }

  /* HUD */
  #hud {
    position: absolute; top: 0; width: 100%; padding: 20px;
    display: none; align-items: center; justify-content: space-between; z-index: 10;
  }
  .health-bg {
    width: 40%; height: 30px; background: var(--panel); 
    border: 2px solid var(--border2); border-radius: 4px;
    position: relative; overflow: hidden;
  }
  #player-health { width: 100%; height: 100%; background: var(--cyan); transition: width 0.1s; transform-origin: left; }
  #enemy-health { width: 100%; height: 100%; background: var(--magenta); transition: width 0.1s; transform-origin: right; }
  
  .player-name {
    position: absolute; top: -25px; font-family: var(--fdisp); font-weight: 700;
    color: var(--txt); font-size: 18px; text-shadow: 0 0 5px rgba(0,0,0,0.8);
  }
  #timer {
    font-family: var(--fdisp); font-size: 36px; font-weight: 900;
    color: var(--amber); text-shadow: 0 0 10px rgba(255,181,71,0.5);
  }

  /* Menus */
  .menu-screen {
    position: absolute; inset: 0; background: rgba(7,11,20,0.9);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 20; backdrop-filter: blur(5px);
  }
  .menu-title {
    font-family: var(--fdisp); font-size: 60px; font-weight: 900;
    color: var(--cyan); letter-spacing: 2px; margin-bottom: 40px;
    text-shadow: 0 0 20px rgba(34,211,238,0.4);
  }
  
  .btn-group { display: flex; gap: 20px; margin-bottom: 30px; }
  .btn {
    padding: 15px 30px; font-family: var(--fdisp); font-size: 18px; font-weight: 700;
    background: var(--panel); color: var(--txt); border: 2px solid var(--border2);
    border-radius: 10px; cursor: pointer; transition: all 0.2s;
  }
  .btn:hover, .btn.active {
    background: var(--amber); color: #000; border-color: var(--amber);
    box-shadow: 0 0 15px rgba(255,181,71,0.4);
  }

  /* Character Select */
  .char-grid { display: flex; gap: 20px; margin-bottom: 30px; }
  .char-card {
    width: 150px; height: 200px; border: 2px solid var(--border2);
    border-radius: 10px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; cursor: pointer;
    background: var(--panel); transition: all 0.2s;
  }
  .char-card:hover, .char-card.selected {
    border-color: var(--cyan); transform: translateY(-5px);
    box-shadow: 0 5px 20px rgba(34,211,238,0.3);
  }
  
  .char-icon { width: 60px; height: 60px; margin-bottom: 15px; display: flex; justify-content: center; align-items: center; }
  .char-name { font-family: var(--fdisp); font-weight: 700; font-size: 16px; }
  
  #game-over { display: none; text-align: center; }
  .result-text { font-family: var(--fdisp); font-size: 50px; font-weight: 900; color: var(--amber); margin-bottom: 20px; }
</style>
</head>
<body>

<div id="game-container">
  <div id="hud">
    <div class="health-bg">
      <div class="player-name" id="p1-name" style="left:0;">P1</div>
      <div id="player-health"></div>
    </div>
    <div id="timer">120</div>
    <div class="health-bg" style="display: flex; justify-content: flex-end;">
      <div class="player-name" id="p2-name" style="right:0;">P2</div>
      <div id="enemy-health"></div>
    </div>
  </div>

  <div id="main-menu" class="menu-screen">
    <div class="menu-title">NOVA FIGHTERS</div>
    <div class="btn-group">
      <button class="btn active" id="mode-cpu" data-mode="cpu">1P vs CPU</button>
      <button class="btn" id="mode-p2" data-mode="p2">1P vs 2P</button>
    </div>
    <div style="font-size: 14px; color: var(--amber); margin-bottom: 15px;">내 캐릭터를 선택하세요</div>
    
    <div class="char-grid">
      <div class="char-card selected" data-index="0">
        <div class="char-icon" style="color: var(--cyan);">
          <svg viewBox="0 0 24 24" fill="currentColor" width="100%" height="100%"><path d="M12 2a2 2 0 0 1 2 2v2h3a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2h-1v2a2 2 0 0 1-2 2H10a2 2 0 0 1-2-2v-2H7a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h3V4a2 2 0 0 1 2-2zm-3 8a1 1 0 1 0 0 2 1 1 0 0 0 0-2zm6 0a1 1 0 1 0 0 2 1 1 0 0 0 0-2z"/></svg>
        </div>
        <div class="char-name">VANGUARD</div>
      </div>
      <div class="char-card" data-index="1">
        <div class="char-icon" style="color: var(--magenta);">
          <svg viewBox="0 0 24 24" fill="currentColor" width="100%" height="100%"><path d="M12 3c-4.4 0-8 3.6-8 8 0 2.6 1.2 4.9 3.1 6.3L6 22l4-2.2c.6.2 1.3.3 2 .3s1.4-.1 2-.3L18 22l-1.1-4.7c1.9-1.4 3.1-3.7 3.1-6.3 0-4.4-3.6-8-8-8zM9 13a2 2 0 1 1 0-4 2 2 0 0 1 0 4zm6 0a2 2 0 1 1 0-4 2 2 0 0 1 0 4z"/></svg>
        </div>
        <div class="char-name">SEOA</div>
      </div>
      <div class="char-card" data-index="2">
        <div class="char-icon" style="color: #00e5a0;">
          <svg viewBox="0 0 24 24" fill="currentColor" width="100%" height="100%"><path d="M3 4h18v4H3V4zm2 6h14v10H5V10zm4 3v4h6v-4H9z"/></svg>
        </div>
        <div class="char-name">TITAN</div>
      </div>
    </div>
    
    <button class="btn" id="start-btn" style="background: var(--amber); color: #000;">전투 시작 (START)</button>
    <div style="margin-top: 20px; font-size: 13px; color: #fff; font-family: var(--fdisp); line-height: 1.6; text-align: center;">
      <span style="color:var(--cyan)">[P1]</span> 이동: W,A,S,D | 일반공격: F | 특수스킬: G<br>
      <span style="color:var(--magenta)">[P2]</span> 이동: 방향키 | 일반공격: L | 특수스킬: K
    </div>
  </div>

  <div id="game-over" class="menu-screen">
    <div class="result-text" id="result-text">PLAYER 1 WINS!</div>
    <button class="btn" id="restart-btn">메인으로 (MAIN MENU)</button>
  </div>

  <canvas id="game-canvas"></canvas>
</div>

<script>
  const canvas = document.getElementById('game-canvas');
  const c = canvas.getContext('2d');
  canvas.width = 1024;
  canvas.height = 576;

  const GRAVITY = 0.7;
  let gameMode = 'cpu'; 
  let timer = 120; // 2분으로 변경
  let timerId;
  let gameActive = false;

  const CHARACTERS = [
    { name: 'VANGUARD', color: '#22d3ee', speed: 5, jump: -15, damage: 8, width: 50 },
    { name: 'SEOA', color: '#ff5c8a', speed: 8, jump: -17, damage: 5, width: 40 }, 
    { name: 'TITAN', color: '#00e5a0', speed: 3, jump: -12, damage: 15, width: 70 }
  ];
  let selectedCharIndex = 0;

  class Fighter {
    constructor({ position, velocity, charData, isEnemy = false }) {
      this.position = position;
      this.velocity = velocity;
      this.width = charData.width;
      this.height = 140;
      this.color = charData.color;
      this.speed = charData.speed;
      this.jumpPower = charData.jump;
      this.damage = charData.damage;
      this.isEnemy = isEnemy;
      
      this.health = 100;
      
      // 공격 상태 관리
      this.attackBox = { position: { x: this.position.x, y: this.position.y }, width: 80, height: 40 };
      this.skillBox = { position: { x: this.position.x, y: this.position.y }, width: 160, height: 80 };
      
      this.isAttacking = false;
      this.isSkilling = false;
      this.hasHit = false;         // 중복 타격 방지 플래그
      this.skillCooldown = false;  // 스킬 쿨타임 플래그
      
      this.lastKey = isEnemy ? 'ArrowLeft' : 'd';
    }

    draw() {
      const { x, y } = this.position;
      const isLeft = (this.lastKey === 'a' || this.lastKey === 'ArrowLeft');
      
      // 몸통
      c.fillStyle = this.color;
      c.fillRect(x, y + 30, this.width, this.height - 50); 
      
      // 머리 (동그랗게 표현)
      c.beginPath();
      c.arc(x + this.width / 2, y + 15, 20, 0, Math.PI * 2);
      c.fill();
      
      // 눈동자 (방향에 따라 이동)
      c.fillStyle = '#000';
      const eyeX = isLeft ? -5 : 5;
      c.fillRect(x + this.width / 2 + eyeX - 6, y + 10, 4, 4);
      c.fillRect(x + this.width / 2 + eyeX + 6, y + 10, 4, 4);

      // 다리
      c.fillStyle = this.color;
      c.fillRect(x + 5, y + this.height - 20, 10, 20);
      c.fillRect(x + this.width - 15, y + this.height - 20, 10, 20);

      // 팔 및 공격 모션 (다양한 스킬 시각화)
      c.fillStyle = '#fff';
      if (this.isAttacking) {
        // 일반 공격: 뻗은 팔
        if (isLeft) c.fillRect(x - 40, y + 45, 50, 12);
        else c.fillRect(x + this.width - 10, y + 45, 50, 12);
      } else if (this.isSkilling) {
        // 특수 스킬: 거대한 에너지 방출
        c.fillStyle = this.color;
        if (isLeft) c.fillRect(x - 140, y + 25, 140, 50);
        else c.fillRect(x + this.width, y + 25, 140, 50);
      } else {
        // 대기 상태: 얌전히 내린 팔
        c.fillStyle = 'rgba(255, 255, 255, 0.7)';
        c.fillRect(x + this.width / 2 - 6, y + 40, 12, 35);
      }
    }

    update() {
      this.draw();
      
      const isLeft = (this.lastKey === 'a' || this.lastKey === 'ArrowLeft');
      
      // 타격 박스 위치 업데이트 (일반 공격)
      this.attackBox.position.x = isLeft ? this.position.x - this.attackBox.width + this.width : this.position.x;
      this.attackBox.position.y = this.position.y + 40;

      // 타격 박스 위치 업데이트 (스킬 공격 - 더 크고 멂)
      this.skillBox.position.x = isLeft ? this.position.x - this.skillBox.width + this.width : this.position.x;
      this.skillBox.position.y = this.position.y + 10;

      // 물리 엔진 (중력 및 이동)
      this.position.x += this.velocity.x;
      this.position.y += this.velocity.y;

      if (this.position.y + this.height + this.velocity.y >= canvas.height - 50) {
        this.velocity.y = 0;
        this.position.y = canvas.height - 50 - this.height;
      } else {
        this.velocity.y += GRAVITY;
      }

      if(this.position.x <= 0) this.position.x = 0;
      if(this.position.x + this.width >= canvas.width) this.position.x = canvas.width - this.width;
    }

    attack() {
      if(this.isAttacking || this.isSkilling) return;
      this.isAttacking = true;
      this.hasHit = false; // 공격 시전 시 타격 판정 초기화
      setTimeout(() => { this.isAttacking = false; }, 150); // 짧은 펀치 유지 시간
    }

    skill() {
      if(this.isAttacking || this.isSkilling || this.skillCooldown) return;
      this.isSkilling = true;
      this.hasHit = false;
      this.skillCooldown = true;
      
      setTimeout(() => { this.isSkilling = false; }, 300); // 스킬 이펙트 유지 시간
      setTimeout(() => { this.skillCooldown = false; }, 2000); // 2초 뒤 스킬 재사용 가능
    }
  }

  let player, enemy;
  const keys = {
    a: { pressed: false }, d: { pressed: false }, w: { pressed: false },
    ArrowLeft: { pressed: false }, ArrowRight: { pressed: false }, ArrowUp: { pressed: false }
  };

  document.getElementById('mode-cpu').addEventListener('click', () => setMode('cpu'));
  document.getElementById('mode-p2').addEventListener('click', () => setMode('p2'));
  
  document.querySelectorAll('.char-card').forEach((card) => {
    card.addEventListener('click', () => {
      selectedCharIndex = parseInt(card.getAttribute('data-index'));
      document.querySelectorAll('.char-card').forEach(el => el.classList.remove('selected'));
      card.classList.add('selected');
    });
  });

  document.getElementById('start-btn').addEventListener('click', startGame);
  document.getElementById('restart-btn').addEventListener('click', () => location.reload());
  
  function setMode(mode) {
    gameMode = mode;
    document.getElementById('mode-cpu').classList.remove('active');
    document.getElementById('mode-p2').classList.remove('active');
    document.getElementById(`mode-${mode}`).classList.add('active');
  }

  function startGame() {
    document.getElementById('main-menu').style.display = 'none';
    document.getElementById('hud').style.display = 'flex';
    
    const p1Char = CHARACTERS[selectedCharIndex];
    document.getElementById('p1-name').innerText = p1Char.name;
    player = new Fighter({
      position: { x: 150, y: 0 }, velocity: { x: 0, y: 0 }, charData: p1Char
    });

    const p2Char = CHARACTERS[gameMode === 'cpu' ? Math.floor(Math.random() * CHARACTERS.length) : 2];
    document.getElementById('p2-name').innerText = gameMode === 'cpu' ? `CPU (${p2Char.name})` : `P2 (${p2Char.name})`;
    enemy = new Fighter({
      position: { x: 800, y: 0 }, velocity: { x: 0, y: 0 }, charData: p2Char, isEnemy: true
    });

    gameActive = true;
    timer = 120;
    decreaseTimer();
    animate();
  }

  function rectangularCollision(rect1, rect2, isSkill = false) {
    const box = isSkill ? rect1.skillBox : rect1.attackBox;
    return (
      box.position.x + box.width >= rect2.position.x &&
      box.position.x <= rect2.position.x + rect2.width &&
      box.position.y + box.height >= rect2.position.y &&
      box.position.y <= rect2.position.y + rect2.height
    );
  }

  function animate() {
    if(!gameActive) return;
    window.requestAnimationFrame(animate);
    
    // 배경 그리기
    c.fillStyle = '#0d1626';
    c.fillRect(0, 0, canvas.width, canvas.height);
    c.fillStyle = '#1e2c43';
    c.fillRect(0, canvas.height - 50, canvas.width, 50);

    player.update();
    enemy.update();

    player.velocity.x = 0;
    if (keys.a.pressed && player.lastKey === 'a') player.velocity.x = -player.speed;
    else if (keys.d.pressed && player.lastKey === 'd') player.velocity.x = player.speed;

    if(gameMode === 'p2') {
      enemy.velocity.x = 0;
      if (keys.ArrowLeft.pressed && enemy.lastKey === 'ArrowLeft') enemy.velocity.x = -enemy.speed;
      else if (keys.ArrowRight.pressed && enemy.lastKey === 'ArrowRight') enemy.velocity.x = enemy.speed;
    } else {
      cpuAI();
    }

    // --- 타격 판정 로직 (hasHit을 통한 중복 데미지 방지) ---
    
    // 1. P1이 P2를 때렸을 때
    if (player.isAttacking && !player.hasHit && rectangularCollision(player, enemy, false)) {
      player.hasHit = true;
      enemy.health -= player.damage;
      document.getElementById('enemy-health').style.width = Math.max(0, enemy.health) + '%';
    }
    // 1-1. P1 스킬 히트
    if (player.isSkilling && !player.hasHit && rectangularCollision(player, enemy, true)) {
      player.hasHit = true;
      enemy.health -= (player.damage * 2.5); // 스킬은 데미지 2.5배
      document.getElementById('enemy-health').style.width = Math.max(0, enemy.health) + '%';
    }

    // 2. P2가 P1을 때렸을 때
    if (enemy.isAttacking && !enemy.hasHit && rectangularCollision(enemy, player, false)) {
      enemy.hasHit = true;
      player.health -= enemy.damage;
      document.getElementById('player-health').style.width = Math.max(0, player.health) + '%';
    }
    // 2-1. P2 스킬 히트
    if (enemy.isSkilling && !enemy.hasHit && rectangularCollision(enemy, player, true)) {
      enemy.hasHit = true;
      player.health -= (enemy.damage * 2.5);
      document.getElementById('player-health').style.width = Math.max(0, player.health) + '%';
    }

    if (enemy.health <= 0 || player.health <= 0) {
      determineWinner({ player, enemy, timerId });
    }
  }

  function decreaseTimer() {
    if (timer > 0) {
      timerId = setTimeout(decreaseTimer, 1000);
      timer--;
      document.getElementById('timer').innerText = timer;
    }
    if (timer === 0) determineWinner({ player, enemy, timerId });
  }

  function determineWinner({ player, enemy, timerId }) {
    clearTimeout(timerId);
    gameActive = false;
    document.getElementById('game-over').style.display = 'flex';
    const resText = document.getElementById('result-text');
    
    if (player.health === enemy.health) resText.innerText = 'TIE!';
    else if (player.health > enemy.health) resText.innerText = 'PLAYER 1 WINS!';
    else resText.innerText = gameMode === 'cpu' ? 'CPU WINS!' : 'PLAYER 2 WINS!';
  }

  function cpuAI() {
    enemy.velocity.x = 0;
    const distance = player.position.x - enemy.position.x;
    
    // 플레이어 쫓아가기
    if (Math.abs(distance) > 90) {
      if (distance > 0) { enemy.velocity.x = enemy.speed - 1; enemy.lastKey = 'ArrowRight'; }
      else { enemy.velocity.x = -(enemy.speed - 1); enemy.lastKey = 'ArrowLeft'; }
    } else {
      // 가까우면 무작위 공격
      if (Math.random() < 0.05) enemy.attack();
    }
    
    // 스킬 사용 및 점프 로직
    if (Math.random() < 0.005) enemy.skill();
    if (Math.random() < 0.01 && enemy.position.y >= canvas.height - 50 - enemy.height) {
      enemy.velocity.y = enemy.jumpPower;
    }
  }

  window.addEventListener('keydown', (event) => {
    if(!gameActive) return;
    
    // P1 조작
    switch (event.key.toLowerCase()) { // 대소문자 방어
      case 'd': keys.d.pressed = true; player.lastKey = 'd'; break;
      case 'a': keys.a.pressed = true; player.lastKey = 'a'; break;
      case 'w': if(player.position.y >= canvas.height - 50 - player.height) player.velocity.y = player.jumpPower; break;
      case 'f': player.attack(); break;
      case 'g': player.skill(); break; // P1 스킬
    }
    
    // P2 조작
    if(gameMode === 'p2') {
      switch (event.key.toLowerCase()) {
        case 'arrowright': keys.ArrowRight.pressed = true; enemy.lastKey = 'ArrowRight'; break;
        case 'arrowleft': keys.ArrowLeft.pressed = true; enemy.lastKey = 'ArrowLeft'; break;
        case 'arrowup': if(enemy.position.y >= canvas.height - 50 - enemy.height) enemy.velocity.y = enemy.jumpPower; break;
        case 'l': enemy.attack(); break;
        case 'k': enemy.skill(); break; // P2 스킬
      }
    }
  });

  window.addEventListener('keyup', (event) => {
    switch (event.key.toLowerCase()) {
      case 'd': keys.d.pressed = false; break;
      case 'a': keys.a.pressed = false; break;
      case 'arrowright': keys.ArrowRight.pressed = false; break;
      case 'arrowleft': keys.ArrowLeft.pressed = false; break;
    }
  });
</script>
</body>
</html>
