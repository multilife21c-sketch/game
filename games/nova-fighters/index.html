<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Strikers - NOVA ARCADE</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg0: #070b14; --panel: #111d31; --border2: #2c4060;
    --txt: #e6ecf7; --amber: #ffb547; --cyan: #22d3ee; --magenta: #ff5c8a;
    --fdisp: 'Orbitron', sans-serif; --fkr: 'Noto Sans KR', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    background: var(--bg0); color: var(--txt); 
    font-family: var(--fkr); display: flex; 
    justify-content: center; align-items: center; 
    height: 100vh; overflow: hidden;
  }
  
  /* Game Container */
  #game-container {
    position: relative; width: 1024px; height: 576px;
    background: #0d1626; border: 2px solid var(--border2);
    box-shadow: 0 0 30px rgba(34, 211, 238, 0.1);
  }

  /* HUD (Heads Up Display) */
  #hud {
    position: absolute; top: 0; width: 100%; padding: 20px;
    display: none; align-items: center; justify-content: space-between; z-index: 10;
  }
  .health-bg {
    width: 40%; height: 30px; background: var(--panel); 
    border: 2px solid var(--border2); border-radius: 4px;
    position: relative; overflow: hidden;
  }
  #player-health {
    width: 100%; height: 100%; background: var(--cyan);
    transition: width 0.2s; transform-origin: left;
  }
  #enemy-health {
    width: 100%; height: 100%; background: var(--magenta);
    transition: width 0.2s; transform-origin: right;
  }
  .player-name {
    position: absolute; top: -25px; font-family: var(--fdisp); font-weight: 700;
    color: var(--txt); font-size: 18px; text-shadow: 0 0 5px rgba(0,0,0,0.8);
  }
  #timer {
    font-family: var(--fdisp); font-size: 36px; font-weight: 900;
    color: var(--amber); text-shadow: 0 0 10px rgba(255,181,71,0.5);
  }

  /* Menus */
  .menu-screen {
    position: absolute; inset: 0; background: rgba(7,11,20,0.9);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 20; backdrop-filter: blur(5px);
  }
  .menu-title {
    font-family: var(--fdisp); font-size: 60px; font-weight: 900;
    color: var(--cyan); letter-spacing: 2px; margin-bottom: 40px;
    text-shadow: 0 0 20px rgba(34,211,238,0.4);
  }
  .btn-group { display: flex; gap: 20px; margin-bottom: 30px; }
  .btn {
    padding: 15px 30px; font-family: var(--fdisp); font-size: 18px; font-weight: 700;
    background: var(--panel); color: var(--txt); border: 2px solid var(--border2);
    border-radius: 10px; cursor: pointer; transition: all 0.2s;
  }
  .btn:hover, .btn.active {
    background: var(--amber); color: #000; border-color: var(--amber);
    box-shadow: 0 0 15px rgba(255,181,71,0.4);
  }

  /* Character Select */
  .char-grid { display: flex; gap: 20px; margin-bottom: 30px; }
  .char-card {
    width: 150px; height: 200px; border: 2px solid var(--border2);
    border-radius: 10px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; cursor: pointer;
    background: var(--panel); transition: all 0.2s;
  }
  .char-card:hover, .char-card.selected {
    border-color: var(--cyan); transform: translateY(-5px);
    box-shadow: 0 5px 20px rgba(34,211,238,0.3);
  }
  .char-color { width: 50px; height: 50px; border-radius: 5px; margin-bottom: 15px; }
  .char-name { font-family: var(--fdisp); font-weight: 700; font-size: 16px; }
  
  #game-over { display: none; text-align: center; }
  .result-text { font-family: var(--fdisp); font-size: 50px; font-weight: 900; color: var(--amber); margin-bottom: 20px; }
</style>
</head>
<body>

<div id="game-container">
  <!-- UI Layer -->
  <div id="hud">
    <div class="health-bg">
      <div class="player-name" id="p1-name" style="left:0;">P1</div>
      <div id="player-health"></div>
    </div>
    <div id="timer">60</div>
    <div class="health-bg" style="display: flex; justify-content: flex-end;">
      <div class="player-name" id="p2-name" style="right:0;">P2 (CPU)</div>
      <div id="enemy-health"></div>
    </div>
  </div>

  <!-- Main Menu -->
  <div id="main-menu" class="menu-screen">
    <div class="menu-title">NEON STRIKERS</div>
    <div class="btn-group">
      <button class="btn active" id="mode-cpu" onclick="setMode('cpu')">1P vs CPU</button>
      <button class="btn" id="mode-p2" onclick="setMode('p2')">1P vs 2P</button>
    </div>
    <div style="font-size: 14px; color: var(--amber); margin-bottom: 15px;">내 캐릭터를 선택하세요</div>
    <div class="char-grid">
      <div class="char-card selected" onclick="selectChar(0, this)">
        <div class="char-color" style="background: var(--cyan);"></div>
        <div class="char-name">VANGUARD</div>
      </div>
      <div class="char-card" onclick="selectChar(1, this)">
        <div class="char-color" style="background: var(--magenta);"></div>
        <div class="char-name">SEOA</div>
      </div>
      <div class="char-card" onclick="selectChar(2, this)">
        <div class="char-color" style="background: #00e5a0;"></div>
        <div class="char-name">TITAN</div>
      </div>
    </div>
    <button class="btn" style="background: var(--amber); color: #000;" onclick="startGame()">전투 시작 (START)</button>
    <div style="margin-top: 20px; font-size: 12px; color: var(--border2); font-family: var(--fdisp);">
      P1: W,A,S,D (Move) / F (Attack)<br>P2: Arrow Keys (Move) / L (Attack)
    </div>
  </div>

  <!-- Game Over Screen -->
  <div id="game-over" class="menu-screen">
    <div class="result-text" id="result-text">PLAYER 1 WINS!</div>
    <button class="btn" onclick="location.reload()">메인으로 (MAIN MENU)</button>
  </div>

  <!-- Game Canvas -->
  <canvas id="game-canvas"></canvas>
</div>

<script>
  // --- Game Config ---
  const canvas = document.getElementById('game-canvas');
  const c = canvas.getContext('2d');
  canvas.width = 1024;
  canvas.height = 576;

  const GRAVITY = 0.7;
  let gameMode = 'cpu'; // 'cpu' or 'p2'
  let timer = 60;
  let timerId;
  let gameActive = false;

  const CHARACTERS = [
    { name: 'VANGUARD', color: '#22d3ee', speed: 5, jump: -15, damage: 10, width: 50 },
    { name: 'SEOA', color: '#ff5c8a', speed: 8, jump: -17, damage: 7, width: 40 }, // 빠른 공속/이속 캐릭터
    { name: 'TITAN', color: '#00e5a0', speed: 3, jump: -12, damage: 20, width: 70 }
  ];
  let selectedCharIndex = 0;

  // --- Classes ---
  class Fighter {
    constructor({ position, velocity, color, charData, isEnemy = false }) {
      this.position = position;
      this.velocity = velocity;
      this.width = charData.width;
      this.height = 150;
      this.color = charData.color;
      this.speed = charData.speed;
      this.jumpPower = charData.jump;
      this.damage = charData.damage;
      this.isEnemy = isEnemy;
      
      this.health = 100;
      this.attackBox = { position: { x: this.position.x, y: this.position.y }, width: 100, height: 50 };
      this.isAttacking = false;
      this.lastKey;
    }

    draw() {
      c.fillStyle = this.color;
      c.fillRect(this.position.x, this.position.y, this.width, this.height);

      // Attack Box (Visual feedback)
      if (this.isAttacking) {
        c.fillStyle = 'rgba(255, 255, 255, 0.8)';
        c.fillRect(this.attackBox.position.x, this.attackBox.position.y, this.attackBox.width, this.attackBox.height);
      }
    }

    update() {
      this.draw();
      
      // Update Attack Box Position based on facing direction
      if (this.isEnemy || this.lastKey === 'a' || this.lastKey === 'ArrowLeft') {
        this.attackBox.position.x = this.position.x - this.attackBox.width + this.width;
      } else {
        this.attackBox.position.x = this.position.x;
      }
      this.attackBox.position.y = this.position.y + 20;

      // Movement & Physics
      this.position.x += this.velocity.x;
      this.position.y += this.velocity.y;

      if (this.position.y + this.height + this.velocity.y >= canvas.height - 50) {
        this.velocity.y = 0;
        this.position.y = canvas.height - 50 - this.height;
      } else {
        this.velocity.y += GRAVITY;
      }

      // Wall bounds
      if(this.position.x <= 0) this.position.x = 0;
      if(this.position.x + this.width >= canvas.width) this.position.x = canvas.width - this.width;
    }

    attack() {
      this.isAttacking = true;
      setTimeout(() => { this.isAttacking = false; }, 100);
    }
  }

  // --- Globals ---
  let player, enemy;
  const keys = {
    a: { pressed: false }, d: { pressed: false }, w: { pressed: false },
    ArrowLeft: { pressed: false }, ArrowRight: { pressed: false }, ArrowUp: { pressed: false }
  };

  // --- UI Functions ---
  function setMode(mode) {
    gameMode = mode;
    document.getElementById('mode-cpu').classList.remove('active');
    document.getElementById('mode-p2').classList.remove('active');
    document.getElementById(`mode-${mode}`).classList.add('active');
  }

  function selectChar(index, element) {
    selectedCharIndex = index;
    document.querySelectorAll('.char-card').forEach(el => el.classList.remove('selected'));
    element.classList.add('selected');
  }

  function startGame() {
    document.getElementById('main-menu').style.display = 'none';
    document.getElementById('hud').style.display = 'flex';
    
    // Player 1
    const p1Char = CHARACTERS[selectedCharIndex];
    document.getElementById('p1-name').innerText = p1Char.name;
    player = new Fighter({
      position: { x: 150, y: 0 }, velocity: { x: 0, y: 0 }, charData: p1Char
    });

    // Player 2 / CPU (Randomly selected for CPU, or pick TITAN as default P2)
    const p2Char = CHARACTERS[gameMode === 'cpu' ? Math.floor(Math.random() * CHARACTERS.length) : 2];
    document.getElementById('p2-name').innerText = gameMode === 'cpu' ? `CPU (${p2Char.name})` : `P2 (${p2Char.name})`;
    enemy = new Fighter({
      position: { x: 800, y: 0 }, velocity: { x: 0, y: 0 }, charData: p2Char, isEnemy: true
    });

    gameActive = true;
    decreaseTimer();
    animate();
  }

  // --- Core Game Loop ---
  function animate() {
    if(!gameActive) return;
    window.requestAnimationFrame(animate);
    
    // Clear canvas
    c.fillStyle = '#0d1626';
    c.fillRect(0, 0, canvas.width, canvas.height);
    // Draw ground
    c.fillStyle = '#1e2c43';
    c.fillRect(0, canvas.height - 50, canvas.width, 50);

    player.update();
    enemy.update();

    // Player Movement
    player.velocity.x = 0;
    if (keys.a.pressed && player.lastKey === 'a') player.velocity.x = -player.speed;
    else if (keys.d.pressed && player.lastKey === 'd') player.velocity.x = player.speed;

    // Enemy Movement (P2)
    if(gameMode === 'p2') {
      enemy.velocity.x = 0;
      if (keys.ArrowLeft.pressed && enemy.lastKey === 'ArrowLeft') enemy.velocity.x = -enemy.speed;
      else if (keys.ArrowRight.pressed && enemy.lastKey === 'ArrowRight') enemy.velocity.x = enemy.speed;
    } else {
      cpuAI(); // CPU Mode
    }

    // Collision Detection (Player hits Enemy)
    if (rectangularCollision({ rect1: player, rect2: enemy }) && player.isAttacking) {
      player.isAttacking = false;
      enemy.health -= player.damage;
      document.getElementById('enemy-health').style.width = Math.max(0, enemy.health) + '%';
    }

    // Collision Detection (Enemy hits Player)
    if (rectangularCollision({ rect1: enemy, rect2: player }) && enemy.isAttacking) {
      enemy.isAttacking = false;
      player.health -= enemy.damage;
      document.getElementById('player-health').style.width = Math.max(0, player.health) + '%';
    }

    // End Game condition
    if (enemy.health <= 0 || player.health <= 0) {
      determineWinner({ player, enemy, timerId });
    }
  }

  // --- Mechanics ---
  function rectangularCollision({ rect1, rect2 }) {
    return (
      rect1.attackBox.position.x + rect1.attackBox.width >= rect2.position.x &&
      rect1.attackBox.position.x <= rect2.position.x + rect2.width &&
      rect1.attackBox.position.y + rect1.attackBox.height >= rect2.position.y &&
      rect1.attackBox.position.y <= rect2.position.y + rect2.height
    );
  }

  function decreaseTimer() {
    if (timer > 0) {
      timerId = setTimeout(decreaseTimer, 1000);
      timer--;
      document.getElementById('timer').innerText = timer;
    }
    if (timer === 0) determineWinner({ player, enemy, timerId });
  }

  function determineWinner({ player, enemy, timerId }) {
    clearTimeout(timerId);
    gameActive = false;
    document.getElementById('game-over').style.display = 'flex';
    const resText = document.getElementById('result-text');
    
    if (player.health === enemy.health) resText.innerText = 'TIE!';
    else if (player.health > enemy.health) resText.innerText = 'PLAYER 1 WINS!';
    else resText.innerText = gameMode === 'cpu' ? 'CPU WINS!' : 'PLAYER 2 WINS!';

    // 포탈에 점수 기록을 위한 이벤트 (portal-sdk.js 연동 예시)
    if (player.health > enemy.health && typeof window.reportScore === 'function') {
        window.reportScore(player.health + timer); 
    }
  }

  // --- CPU AI (Simple) ---
  function cpuAI() {
    enemy.velocity.x = 0;
    const distance = player.position.x - enemy.position.x;
    
    if (Math.abs(distance) > 80) { // Follow player
      if (distance > 0) { enemy.velocity.x = enemy.speed - 1; enemy.lastKey = 'ArrowRight'; }
      else { enemy.velocity.x = -(enemy.speed - 1); enemy.lastKey = 'ArrowLeft'; }
    } else { // Attack randomly if close
      if (Math.random() < 0.05) enemy.attack();
    }
    // Random jump
    if (Math.random() < 0.01 && enemy.position.y >= canvas.height - 50 - enemy.height) {
      enemy.velocity.y = enemy.jumpPower;
    }
  }

  // --- Controls ---
  window.addEventListener('keydown', (event) => {
    if(!gameActive) return;
    switch (event.key) {
      // Player 1
      case 'd': keys.d.pressed = true; player.lastKey = 'd'; break;
      case 'a': keys.a.pressed = true; player.lastKey = 'a'; break;
      case 'w': if(player.position.y >= canvas.height - 50 - player.height) player.velocity.y = player.jumpPower; break;
      case 'f': player.attack(); break;
      
      // Player 2
      if(gameMode === 'p2') {
        case 'ArrowRight': keys.ArrowRight.pressed = true; enemy.lastKey = 'ArrowRight'; break;
        case 'ArrowLeft': keys.ArrowLeft.pressed = true; enemy.lastKey = 'ArrowLeft'; break;
        case 'ArrowUp': if(enemy.position.y >= canvas.height - 50 - enemy.height) enemy.velocity.y = enemy.jumpPower; break;
        case 'l': enemy.attack(); break;
      }
    }
  });

  window.addEventListener('keyup', (event) => {
    switch (event.key) {
      case 'd': keys.d.pressed = false; break;
      case 'a': keys.a.pressed = false; break;
      case 'ArrowRight': keys.ArrowRight.pressed = false; break;
      case 'ArrowLeft': keys.ArrowLeft.pressed = false; break;
    }
  });
</script>
</body>
</html>
