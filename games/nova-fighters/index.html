<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Fighters - NOVA ARCADE</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg0: #070b14; --panel: #111d31; --panel2: #1a2a44; --border2: #2c4060;
    --txt: #e6ecf7; --amber: #ffb547; --cyan: #22d3ee; --magenta: #ff5c8a;
    --green: #00e5a0; --fdisp: 'Orbitron', sans-serif; --fkr: 'Noto Sans KR', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
  body { 
    background: var(--bg0); color: var(--txt); 
    font-family: var(--fkr); display: flex; 
    justify-content: center; align-items: center; 
    height: 100vh; overflow: hidden;
  }
  
  #game-container {
    position: relative; width: 1024px; height: 576px;
    background: #000; border: 2px solid var(--border2);
    box-shadow: 0 0 50px rgba(34, 211, 238, 0.15); border-radius: 8px; overflow: hidden;
  }

  /* HUD */
  #hud {
    position: absolute; top: 0; width: 100%; padding: 20px;
    display: none; align-items: flex-start; justify-content: space-between; z-index: 10;
  }
  
  .status-wrapper { width: 38%; display: flex; flex-direction: column; gap: 8px; position: relative; }
  
  .health-bg {
    width: 100%; height: 32px; background: rgba(26, 42, 68, 0.7); 
    border: 2px solid var(--border2); border-radius: 6px; overflow: hidden; position: relative;
    backdrop-filter: blur(4px); box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
  }
  #player-health { position: absolute; width: 100%; height: 100%; background: linear-gradient(90deg, #0ea5e9, var(--cyan)); transition: width 0.1s; transform-origin: left; }
  #enemy-health { position: absolute; width: 100%; height: 100%; background: linear-gradient(90deg, #e11d48, var(--magenta)); transition: width 0.1s; right: 0; }
  
  .energy-bg {
    width: 75%; height: 12px; background: rgba(7, 11, 20, 0.7); 
    border: 1px solid var(--border2); border-radius: 4px; overflow: hidden;
  }
  #player-energy { width: 0%; height: 100%; background: linear-gradient(90deg, #ca8a04, var(--amber)); transition: width 0.1s; }
  #enemy-energy { width: 0%; height: 100%; background: linear-gradient(90deg, #ca8a04, var(--amber)); transition: width 0.1s; float: right; }

  .player-name {
    position: absolute; top: -25px; font-family: var(--fdisp); font-weight: 900;
    color: var(--txt); font-size: 22px; text-shadow: 2px 2px 0px #000; letter-spacing: 1px;
  }
  
  #timer {
    font-family: var(--fdisp); font-size: 48px; font-weight: 900;
    color: #fff; text-shadow: 0 0 15px var(--amber), 2px 2px 0px #000; margin-top: -10px;
  }

  /* Menus */
  .menu-screen {
    position: absolute; inset: 0; background: radial-gradient(circle at center, rgba(17,29,49,0.95), rgba(7,11,20,1));
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 20; backdrop-filter: blur(8px);
  }
  .menu-title {
    font-family: var(--fdisp); font-size: 65px; font-weight: 900;
    color: var(--txt); letter-spacing: 3px; margin-bottom: 30px;
    text-shadow: 0 0 20px rgba(34,211,238,0.6);
  }
  
  .btn-group { display: flex; gap: 20px; margin-bottom: 30px; }
  .btn {
    padding: 15px 35px; font-family: var(--fdisp); font-size: 18px; font-weight: 700;
    background: var(--panel2); color: var(--txt); border: 2px solid var(--border2);
    border-radius: 8px; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
  }
  .btn:hover, .btn.active {
    background: var(--amber); color: #1a1206; border-color: #f59e0b;
    box-shadow: 0 0 20px rgba(255,181,71,0.5); transform: translateY(-2px);
  }

  .char-grid { display: flex; gap: 20px; margin-bottom: 30px; }
  .char-card {
    width: 180px; height: 280px; border: 2px solid var(--border2);
    border-radius: 12px; display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start; cursor: pointer;
    background: var(--panel); transition: all 0.2s; position: relative; overflow: hidden;
  }
  .char-card:hover, .char-card.selected {
    border-color: var(--amber); transform: translateY(-5px);
    box-shadow: 0 10px 25px rgba(255,181,71,0.2), inset 0 0 20px rgba(255,181,71,0.1);
  }
  
  .char-icon { width: 80px; height: 80px; margin: 20px 0 10px; }
  .char-name { font-family: var(--fdisp); font-weight: 900; font-size: 18px; color: var(--txt); margin-bottom: 15px; }
  
  .stat-row { width: 85%; display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; font-size: 11px; color: var(--muted); }
  .stat-bar-bg { width: 60px; height: 6px; background: var(--bg0); border-radius: 3px; overflow: hidden; margin: 0 5px; }
  .stat-bar { height: 100%; border-radius: 3px; }
  .stat-val { font-family: var(--fdisp); font-weight: 700; width: 25px; text-align: right; color: var(--txt); }

  #game-over { display: none; text-align: center; }
  .result-text { font-family: var(--fdisp); font-size: 60px; font-weight: 900; color: var(--amber); margin-bottom: 20px; text-shadow: 0 0 20px rgba(255,181,71,0.5); }
  
  .controls-hint {
    margin-top: 25px; font-size: 13px; color: #cbd5e1; font-family: var(--fkr); line-height: 1.8; 
    text-align: center; background: rgba(0,0,0,0.6); padding: 20px; border-radius: 12px; border: 1px solid var(--border2);
  }
  .key { display: inline-block; padding: 2px 6px; background: #334155; border-radius: 4px; font-family: var(--fdisp); font-size: 11px; margin: 0 2px; border-bottom: 2px solid #1e293b; color: #fff;}
</style>
</head>
<body>

<div id="game-container">
  <div id="hud">
    <div class="status-wrapper">
      <div class="player-name" id="p1-name" style="left:0;">P1</div>
      <div class="health-bg"><div id="player-health"></div></div>
      <div class="energy-bg"><div id="player-energy"></div></div>
    </div>
    <div id="timer">120</div>
    <div class="status-wrapper" style="align-items: flex-end;">
      <div class="player-name" id="p2-name" style="right:0;">P2</div>
      <div class="health-bg"><div id="enemy-health"></div></div>
      <div class="energy-bg"><div id="enemy-energy"></div></div>
    </div>
  </div>

  <div id="main-menu" class="menu-screen">
    <div class="menu-title">NOVA FIGHTERS</div>
    <div class="btn-group">
      <button class="btn active" id="mode-cpu" data-mode="cpu">1P vs CPU</button>
      <button class="btn" id="mode-p2" data-mode="p2">1P vs 2P</button>
    </div>
    
    <div class="char-grid">
      <div class="char-card selected" data-index="0">
        <div class="char-icon" style="color: var(--cyan);"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a2 2 0 0 1 2 2v2h3a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2h-1v2a2 2 0 0 1-2 2H10a2 2 0 0 1-2-2v-2H7a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h3V4a2 2 0 0 1 2-2zm-3 8a1 1 0 1 0 0 2 1 1 0 0 0 0-2zm6 0a1 1 0 1 0 0 2 1 1 0 0 0 0-2z"/></svg></div>
        <div class="char-name">VANGUARD</div>
        <div class="stat-row"><span>체력</span><div class="stat-bar-bg"><div class="stat-bar" style="width:70%; background:var(--cyan)"></div></div><span class="stat-val">3400</span></div>
        <div class="stat-row"><span>속도</span><div class="stat-bar-bg"><div class="stat-bar" style="width:50%; background:var(--amber)"></div></div><span class="stat-val">150</span></div>
      </div>
      <div class="char-card" data-index="1">
        <div class="char-icon" style="color: var(--magenta);"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3c-4.4 0-8 3.6-8 8 0 2.6 1.2 4.9 3.1 6.3L6 22l4-2.2c.6.2 1.3.3 2 .3s1.4-.1 2-.3L18 22l-1.1-4.7c1.9-1.4 3.1-3.7 3.1-6.3 0-4.4-3.6-8-8-8zM9 13a2 2 0 1 1 0-4 2 2 0 0 1 0 4zm6 0a2 2 0 1 1 0-4 2 2 0 0 1 0 4z"/></svg></div>
        <div class="char-name">SEOA</div>
        <div class="stat-row"><span>체력</span><div class="stat-bar-bg"><div class="stat-bar" style="width:50%; background:var(--cyan)"></div></div><span class="stat-val">2800</span></div>
        <div class="stat-row"><span>속도</span><div class="stat-bar-bg"><div class="stat-bar" style="width:90%; background:var(--amber)"></div></div><span class="stat-val">210</span></div>
      </div>
      <div class="char-card" data-index="2">
        <div class="char-icon" style="color: var(--green);"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 4h18v4H3V4zm2 6h14v10H5V10zm4 3v4h6v-4H9z"/></svg></div>
        <div class="char-name">TITAN</div>
        <div class="stat-row"><span>체력</span><div class="stat-bar-bg"><div class="stat-bar" style="width:95%; background:var(--cyan)"></div></div><span class="stat-val">4800</span></div>
        <div class="stat-row"><span>속도</span><div class="stat-bar-bg"><div class="stat-bar" style="width:30%; background:var(--amber)"></div></div><span class="stat-val">95</span></div>
      </div>
    </div>
    
    <button class="btn" id="start-btn" style="background: var(--amber); color: #000; padding: 18px 50px; font-size: 22px;">전투 시작 (START)</button>
    <div class="controls-hint">
      <span style="color:var(--cyan); font-weight:bold;">[P1]</span> 이동: <span class="key">W</span><span class="key">A</span><span class="key">D</span> | 공격: <span class="key">F</span><br>
      <span style="color:var(--magenta); font-weight:bold;">[P2]</span> 이동: <span class="key">↑</span><span class="key">←</span><span class="key">→</span> | 공격: <span class="key">L</span>
    </div>
  </div>

  <div id="game-over" class="menu-screen">
    <div class="result-text" id="result-text">PLAYER 1 WINS!</div>
    <button class="btn" id="restart-btn">메인으로 (MAIN MENU)</button>
  </div>

  <canvas id="game-canvas"></canvas>
</div>

<script>
  const canvas = document.getElementById('game-canvas');
  const c = canvas.getContext('2d');
  canvas.width = 1024;
  canvas.height = 576;

  const GRAVITY = 0.7;
  let gameMode = 'cpu'; 
  let timer = 120;
  let timerId;
  let gameActive = false;

  // 스프라이트 엔진 클래스 (이미지를 불러와 프레임별로 애니메이션 처리)
  class Sprite {
    constructor({ position, imageSrc, scale = 1, framesMax = 1, offset = { x: 0, y: 0 } }) {
      this.position = position;
      this.width = 50;
      this.height = 150;
      this.image = new Image();
      this.image.src = imageSrc;
      this.scale = scale;
      this.framesMax = framesMax;
      this.framesCurrent = 0;
      this.framesElapsed = 0;
      this.framesHold = 5;
      this.offset = offset;
    }

    draw() {
      c.drawImage(
        this.image,
        this.framesCurrent * (this.image.width / this.framesMax),
        0,
        this.image.width / this.framesMax,
        this.image.height,
        this.position.x - this.offset.x,
        this.position.y - this.offset.y,
        (this.image.width / this.framesMax) * this.scale,
        this.image.height * this.scale
      )
    }

    animateFrames() {
      this.framesElapsed++
      if (this.framesElapsed % this.framesHold === 0) {
        if (this.framesCurrent < this.framesMax - 1) this.framesCurrent++;
        else this.framesCurrent = 0;
      }
    }

    update() {
      this.draw();
      if (gameActive || this.framesMax > 1) this.animateFrames();
    }
  }

  // 게임 배경 에셋 연결
  const background = new Sprite({
    position: { x: 0, y: 0 },
    imageSrc: 'https://raw.githubusercontent.com/chriscourses/fighting-game-tutorial/main/img/background.png'
  });
  const shop = new Sprite({
    position: { x: 600, y: 128 },
    imageSrc: 'https://raw.githubusercontent.com/chriscourses/fighting-game-tutorial/main/img/shop.png',
    scale: 2.75, framesMax: 6
  });

  // 캐릭터 정보 (외부 스프라이트 이미지 URL 연결)
  const CHARACTERS = [
    {
      name: 'VANGUARD', id: 'vanguard', color: '#22d3ee', speed: 5, jump: -15, damage: 15, maxHp: 100, width: 50, height: 150,
      scale: 2.5, offset: { x: 215, y: 157 }, nativeFacing: 'right',
      sprites: {
        idle: { src: 'https://raw.githubusercontent.com/chriscourses/fighting-game-tutorial/main/img/samuraiMack/Idle.png', framesMax: 8 },
        run: { src: 'https://raw.githubusercontent.com/chriscourses/fighting-game-tutorial/main/img/samuraiMack/Run.png', framesMax: 8 },
        jump: { src: 'https://raw.githubusercontent.com/chriscourses/fighting-game-tutorial/main/img/samuraiMack/Jump.png', framesMax: 2 },
        fall: { src: 'https://raw.githubusercontent.com/chriscourses/fighting-game-tutorial/main/img/samuraiMack/Fall.png', framesMax: 2 },
        attack1: { src: 'https://raw.githubusercontent.com/chriscourses/fighting-game-tutorial/main/img/samuraiMack/Attack1.png', framesMax: 6 }
      },
      attackBox: { offset: { x: 65, y: 50 }, width: 160, height: 50 }, hitFrame: 4
    },
    {
      name: 'SEOA', id: 'seoa', color: '#ff5c8a', speed: 7, jump: -17, damage: 10, maxHp: 85, width: 50, height: 150,
      scale: 2.5, offset: { x: 215, y: 167 }, nativeFacing: 'left',
      sprites: {
        idle: { src: 'https://raw.githubusercontent.com/chriscourses/fighting-game-tutorial/main/img/kenji/Idle.png', framesMax: 4 },
        run: { src: 'https://raw.githubusercontent.com/chriscourses/fighting-game-tutorial/main/img/kenji/Run.png', framesMax: 8 },
        jump: { src: 'https://raw.githubusercontent.com/chriscourses/fighting-game-tutorial/main/img/kenji/Jump.png', framesMax: 2 },
        fall: { src: 'https://raw.githubusercontent.com/chriscourses/fighting-game-tutorial/main/img/kenji/Fall.png', framesMax: 2 },
        attack1: { src: 'https://raw.githubusercontent.com/chriscourses/fighting-game-tutorial/main/img/kenji/Attack1.png', framesMax: 4 }
      },
      attackBox: { offset: { x: 65, y: 50 }, width: 140, height: 50 }, hitFrame: 2
    },
    {
      name: 'TITAN', id: 'titan', color: '#00e5a0', speed: 3, jump: -12, damage: 25, maxHp: 130, width: 60, height: 170,
      scale: 2.8, offset: { x: 240, y: 180 }, nativeFacing: 'right',
      sprites: {
        idle: { src: 'https://raw.githubusercontent.com/chriscourses/fighting-game-tutorial/main/img/samuraiMack/Idle.png', framesMax: 8 },
        run: { src: 'https://raw.githubusercontent.com/chriscourses/fighting-game-tutorial/main/img/samuraiMack/Run.png', framesMax: 8 },
        jump: { src: 'https://raw.githubusercontent.com/chriscourses/fighting-game-tutorial/main/img/samuraiMack/Jump.png', framesMax: 2 },
        fall: { src: 'https://raw.githubusercontent.com/chriscourses/fighting-game-tutorial/main/img/samuraiMack/Fall.png', framesMax: 2 },
        attack1: { src: 'https://raw.githubusercontent.com/chriscourses/fighting-game-tutorial/main/img/samuraiMack/Attack1.png', framesMax: 6 }
      },
      attackBox: { offset: { x: 70, y: 50 }, width: 180, height: 60 }, hitFrame: 4
    }
  ];

  class Fighter extends Sprite {
    constructor({ position, velocity, charData, isEnemy = false }) {
      super({
        position,
        imageSrc: charData.sprites.idle.src,
        framesMax: charData.sprites.idle.framesMax,
        scale: charData.scale,
        offset: charData.offset
      });
      
      this.velocity = velocity;
      this.width = charData.width;
      this.height = charData.height;
      this.charData = charData;
      this.isEnemy = isEnemy;
      
      this.maxHealth = charData.maxHp;
      this.health = this.maxHealth;
      this.speed = charData.speed;
      this.jumpPower = charData.jump;
      this.damage = charData.damage;
      
      this.lastKey = isEnemy ? 'ArrowLeft' : 'd';
      this.attackBox = {
        position: { x: this.position.x, y: this.position.y },
        offset: charData.attackBox.offset,
        width: charData.attackBox.width,
        height: charData.attackBox.height
      };
      
      this.isAttacking = false;
      this.hasHit = false;
      
      // 스프라이트 딕셔너리 로드
      this.sprites = {};
      for (const sprite in charData.sprites) {
        this.sprites[sprite] = new Image();
        this.sprites[sprite].src = charData.sprites[sprite].src;
        this.sprites[sprite].framesMax = charData.sprites[sprite].framesMax;
      }
      this.nativeFacing = charData.nativeFacing;
    }

    // 방향 전환(Flip)을 포함한 스프라이트 렌더링
    draw() {
      c.save();
      let isLeft = (this.lastKey === 'a' || this.lastKey === 'ArrowLeft');
      let shouldFlip = false;
      
      if (this.nativeFacing === 'right' && isLeft) shouldFlip = true;
      if (this.nativeFacing === 'left' && !isLeft) shouldFlip = true;
      
      // TITAN 캐릭터는 색상 필터 적용 (보스 느낌)
      if (this.charData.id === 'titan') {
         c.filter = 'hue-rotate(150deg) saturate(1.5)';
      }

      let drawX = this.position.x - this.offset.x;
      let drawY = this.position.y - this.offset.y;
      let frameWidth = this.image.width / this.framesMax;

      if (shouldFlip) {
         c.translate(this.position.x + this.width / 2, this.position.y);
         c.scale(-1, 1);
         drawX = - (frameWidth * this.scale) / 2 - this.offset.x + (this.width / 2);
         drawY = - this.offset.y;
      }

      c.drawImage(
        this.image,
        this.framesCurrent * frameWidth,
        0,
        frameWidth,
        this.image.height,
        drawX,
        drawY,
        frameWidth * this.scale,
        this.image.height * this.scale
      )
      c.restore();
    }

    update() {
      this.draw();
      if(gameActive) this.animateFrames();

      // 타격 박스 위치 업데이트
      let isLeft = (this.lastKey === 'a' || this.lastKey === 'ArrowLeft');
      if (isLeft) {
        this.attackBox.position.x = this.position.x - this.attackBox.width + this.width - this.attackBox.offset.x;
      } else {
        this.attackBox.position.x = this.position.x + this.attackBox.offset.x;
      }
      this.attackBox.position.y = this.position.y + this.attackBox.offset.y;

      // 물리 엔진
      this.position.x += this.velocity.x;
      this.position.y += this.velocity.y;

      const groundY = canvas.height - 96; // 배경 바닥 높이 보정
      if (this.position.y + this.height + this.velocity.y >= groundY) {
        this.velocity.y = 0;
        this.position.y = groundY - this.height;
      } else {
        this.velocity.y += GRAVITY;
      }
      
      if(this.position.x <= 0) this.position.x = 0;
      if(this.position.x + this.width >= canvas.width) this.position.x = canvas.width - this.width;

      this.switchSprite();
    }

    // 상황에 맞는 애니메이션 교체 로직
    switchSprite() {
      if (this.image === this.sprites.attack1) {
        if (this.framesCurrent < this.sprites.attack1.framesMax - 1) return;
        else this.isAttacking = false;
      }

      if (this.velocity.y < 0) this.switch('jump');
      else if (this.velocity.y > 0) this.switch('fall');
      else if (this.velocity.x !== 0) this.switch('run');
      else this.switch('idle');
    }

    switch(sprite) {
      if (this.image === this.sprites[sprite]) return;
      this.image = this.sprites[sprite];
      this.framesMax = this.sprites[sprite].framesMax;
      this.framesCurrent = 0;
    }

    attack() {
      this.switch('attack1');
      this.isAttacking = true;
      this.hasHit = false;
    }
  }

  let player, enemy;
  const keys = {
    a: { pressed: false }, d: { pressed: false },
    ArrowLeft: { pressed: false }, ArrowRight: { pressed: false }
  };

  document.getElementById('mode-cpu').addEventListener('click', () => setMode('cpu'));
  document.getElementById('mode-p2').addEventListener('click', () => setMode('p2'));
  
  let selectedCharIndex = 0;
  document.querySelectorAll('.char-card').forEach(card => {
    card.addEventListener('click', () => {
      selectedCharIndex = parseInt(card.getAttribute('data-index'));
      document.querySelectorAll('.char-card').forEach(el => el.classList.remove('selected'));
      card.classList.add('selected');
    });
  });
  
  document.getElementById('start-btn').addEventListener('click', startGame);
  document.getElementById('restart-btn').addEventListener('click', () => location.reload());
  
  function setMode(mode) {
    gameMode = mode;
    document.getElementById('mode-cpu').classList.remove('active');
    document.getElementById('mode-p2').classList.remove('active');
    document.getElementById(`mode-${mode}`).classList.add('active');
  }

  function startGame() {
    document.getElementById('main-menu').style.display = 'none';
    document.getElementById('hud').style.display = 'flex';
    
    const p1Char = CHARACTERS[selectedCharIndex];
    document.getElementById('p1-name').innerText = p1Char.name;
    player = new Fighter({ position: { x: 150, y: 0 }, velocity: { x: 0, y: 0 }, charData: p1Char });

    const p2Char = CHARACTERS[gameMode === 'cpu' ? Math.floor(Math.random() * CHARACTERS.length) : 2];
    document.getElementById('p2-name').innerText = gameMode === 'cpu' ? `CPU (${p2Char.name})` : `P2 (${p2Char.name})`;
    enemy = new Fighter({ position: { x: 800, y: 0 }, velocity: { x: 0, y: 0 }, charData: p2Char, isEnemy: true });

    gameActive = true; timer = 120;
    decreaseTimer(); animate();
  }

  function rectangularCollision(rect1, rect2) {
    return (
      rect1.attackBox.position.x + rect1.attackBox.width >= rect2.position.x &&
      rect1.attackBox.position.x <= rect2.position.x + rect2.width &&
      rect1.attackBox.position.y + rect1.attackBox.height >= rect2.position.y &&
      rect1.attackBox.position.y <= rect2.position.y + rect2.height
    );
  }

  function animate() {
    if(!gameActive) return;
    window.requestAnimationFrame(animate);
    
    c.fillStyle = 'black';
    c.fillRect(0, 0, canvas.width, canvas.height);
    
    background.update();
    shop.update();
    
    // UI 시인성을 위해 배경 어둡게 처리
    c.fillStyle = 'rgba(0, 0, 0, 0.2)';
    c.fillRect(0, 0, canvas.width, canvas.height);

    player.update();
    enemy.update();

    player.velocity.x = 0;
    if (keys.a.pressed && player.lastKey === 'a') player.velocity.x = -player.speed;
    else if (keys.d.pressed && player.lastKey === 'd') player.velocity.x = player.speed;

    if(gameMode === 'p2') {
      enemy.velocity.x = 0;
      if (keys.ArrowLeft.pressed && enemy.lastKey === 'ArrowLeft') enemy.velocity.x = -enemy.speed;
      else if (keys.ArrowRight.pressed && enemy.lastKey === 'ArrowRight') enemy.velocity.x = enemy.speed;
    } else {
      cpuAI();
    }

    // 공격 애니메이션 중 특정 타격 프레임(Hit Frame)에서만 데미지 판정
    if (player.isAttacking && player.framesCurrent === player.charData.hitFrame && !player.hasHit && rectangularCollision(player, enemy)) {
      player.hasHit = true;
      enemy.health -= player.damage;
      document.getElementById('enemy-health').style.width = Math.max(0, (enemy.health / enemy.maxHealth * 100)) + '%';
    }
    
    if (enemy.isAttacking && enemy.framesCurrent === enemy.charData.hitFrame && !enemy.hasHit && rectangularCollision(enemy, player)) {
      enemy.hasHit = true;
      player.health -= enemy.damage;
      document.getElementById('player-health').style.width = Math.max(0, (player.health / player.maxHealth * 100)) + '%';
    }

    if (enemy.health <= 0 || player.health <= 0) determineWinner({ player, enemy, timerId });
  }

  function decreaseTimer() {
    if (timer > 0) {
      timerId = setTimeout(decreaseTimer, 1000);
      timer--; document.getElementById('timer').innerText = timer;
    }
    if (timer === 0) determineWinner({ player, enemy, timerId });
  }

  function determineWinner({ player, enemy, timerId }) {
    clearTimeout(timerId); gameActive = false;
    document.getElementById('game-over').style.display = 'flex';
    const resText = document.getElementById('result-text');
    
    const p1HpRatio = player.health / player.maxHealth;
    const p2HpRatio = enemy.health / enemy.maxHealth;
    
    if (p1HpRatio === p2HpRatio) resText.innerText = 'TIE!';
    else if (p1HpRatio > p2HpRatio) resText.innerText = 'PLAYER 1 WINS!';
    else resText.innerText = gameMode === 'cpu' ? 'CPU WINS!' : 'PLAYER 2 WINS!';
  }

  function cpuAI() {
    enemy.velocity.x = 0;
    const distance = player.position.x - enemy.position.x;
    const absDist = Math.abs(distance);
    const groundY = canvas.height - 96;
    const isEnemyInAir = (enemy.position.y + enemy.height) < groundY;
    
    if (absDist > 120) {
      if (distance > 0) { enemy.velocity.x = enemy.speed - 1; enemy.lastKey = 'ArrowRight'; }
      else { enemy.velocity.x = -(enemy.speed - 1); enemy.lastKey = 'ArrowLeft'; }
    } else {
      if (Math.random() < 0.08) enemy.attack();
    }
    
    if (Math.random() < 0.01 && !isEnemyInAir) enemy.velocity.y = enemy.jumpPower;
  }

  window.addEventListener('keydown', (event) => {
    if(!gameActive) return;
    switch (event.key.toLowerCase()) {
      case 'd': keys.d.pressed = true; player.lastKey = 'd'; break;
      case 'a': keys.a.pressed = true; player.lastKey = 'a'; break;
      case 'w': if(player.position.y >= canvas.height - 96 - player.height) player.velocity.y = player.jumpPower; break;
      case 'f': player.attack(); break;
    }
    if(gameMode === 'p2') {
      switch (event.key.toLowerCase()) {
        case 'arrowright': keys.ArrowRight.pressed = true; enemy.lastKey = 'ArrowRight'; break;
        case 'arrowleft': keys.ArrowLeft.pressed = true; enemy.lastKey = 'ArrowLeft'; break;
        case 'arrowup': if(enemy.position.y >= canvas.height - 96 - enemy.height) enemy.velocity.y = enemy.jumpPower; break;
        case 'l': enemy.attack(); break;
      }
    }
  });

  window.addEventListener('keyup', (event) => {
    switch (event.key.toLowerCase()) {
      case 'd': keys.d.pressed = false; break;
      case 'a': keys.a.pressed = false; break;
      case 'arrowright': keys.ArrowRight.pressed = false; break;
      case 'arrowleft': keys.ArrowLeft.pressed = false; break;
    }
  });
</script>
</body>
</html>
