<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Fighters - NOVA ARCADE</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg0: #070b14; --panel: #111d31; --border2: #2c4060;
    --txt: #e6ecf7; --amber: #ffb547; --cyan: #22d3ee; --magenta: #ff5c8a;
    --fdisp: 'Orbitron', sans-serif; --fkr: 'Noto Sans KR', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    background: var(--bg0); color: var(--txt); 
    font-family: var(--fkr); display: flex; 
    justify-content: center; align-items: center; 
    height: 100vh; overflow: hidden;
  }
  
  #game-container {
    position: relative; width: 1024px; height: 576px;
    background: #0d1626; border: 2px solid var(--border2);
    box-shadow: 0 0 40px rgba(34, 211, 238, 0.15);
  }

  /* HUD */
  #hud {
    position: absolute; top: 0; width: 100%; padding: 20px;
    display: none; align-items: flex-start; justify-content: space-between; z-index: 10;
  }
  
  .status-wrapper { width: 40%; display: flex; flex-direction: column; gap: 8px; position: relative; }
  
  .health-bg {
    width: 100%; height: 28px; background: var(--panel); 
    border: 2px solid var(--border2); border-radius: 4px; overflow: hidden;
  }
  #player-health { width: 100%; height: 100%; background: var(--cyan); transition: width 0.1s; transform-origin: left; }
  #enemy-health { width: 100%; height: 100%; background: var(--magenta); transition: width 0.1s; transform-origin: right; }
  
  .energy-bg {
    width: 80%; height: 10px; background: #070b14; 
    border: 1px solid var(--border2); border-radius: 2px; overflow: hidden;
  }
  #player-energy { width: 0%; height: 100%; background: var(--amber); transition: width 0.1s; transform-origin: left; }
  #enemy-energy { width: 0%; height: 100%; background: var(--amber); transition: width 0.1s; transform-origin: right; }

  .player-name {
    position: absolute; top: -25px; font-family: var(--fdisp); font-weight: 900;
    color: var(--txt); font-size: 20px; text-shadow: 0 0 5px rgba(0,0,0,0.8);
  }
  
  #timer {
    font-family: var(--fdisp); font-size: 42px; font-weight: 900;
    color: #fff; text-shadow: 0 0 15px var(--amber); margin-top: -10px;
  }

  /* Menus */
  .menu-screen {
    position: absolute; inset: 0; background: rgba(7,11,20,0.9);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 20; backdrop-filter: blur(5px);
  }
  .menu-title {
    font-family: var(--fdisp); font-size: 60px; font-weight: 900;
    color: var(--cyan); letter-spacing: 2px; margin-bottom: 40px;
    text-shadow: 0 0 20px rgba(34,211,238,0.5);
  }
  
  .btn-group { display: flex; gap: 20px; margin-bottom: 30px; }
  .btn {
    padding: 15px 30px; font-family: var(--fdisp); font-size: 18px; font-weight: 700;
    background: var(--panel); color: var(--txt); border: 2px solid var(--border2);
    border-radius: 10px; cursor: pointer; transition: all 0.2s;
  }
  .btn:hover, .btn.active {
    background: var(--amber); color: #000; border-color: var(--amber);
    box-shadow: 0 0 15px rgba(255,181,71,0.5);
  }

  .char-grid { display: flex; gap: 20px; margin-bottom: 30px; }
  .char-card {
    width: 150px; height: 200px; border: 2px solid var(--border2);
    border-radius: 10px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; cursor: pointer;
    background: var(--panel); transition: all 0.2s;
  }
  .char-card:hover, .char-card.selected {
    border-color: var(--cyan); transform: translateY(-5px);
    box-shadow: 0 5px 20px rgba(34,211,238,0.4);
  }
  
  .char-icon { width: 60px; height: 60px; margin-bottom: 15px; display: flex; justify-content: center; align-items: center; }
  .char-name { font-family: var(--fdisp); font-weight: 700; font-size: 16px; }
  
  #game-over { display: none; text-align: center; }
  .result-text { font-family: var(--fdisp); font-size: 55px; font-weight: 900; color: var(--amber); margin-bottom: 20px; }
</style>
</head>
<body>

<div id="game-container">
  <div id="hud">
    <div class="status-wrapper">
      <div class="player-name" id="p1-name" style="left:0;">P1</div>
      <div class="health-bg"><div id="player-health"></div></div>
      <div class="energy-bg"><div id="player-energy"></div></div>
    </div>
    <div id="timer">120</div>
    <div class="status-wrapper" style="align-items: flex-end;">
      <div class="player-name" id="p2-name" style="right:0;">P2</div>
      <div class="health-bg"><div id="enemy-health"></div></div>
      <div class="energy-bg"><div id="enemy-energy"></div></div>
    </div>
  </div>

  <div id="main-menu" class="menu-screen">
    <div class="menu-title">NOVA FIGHTERS</div>
    <div class="btn-group">
      <button class="btn active" id="mode-cpu" data-mode="cpu">1P vs CPU</button>
      <button class="btn" id="mode-p2" data-mode="p2">1P vs 2P</button>
    </div>
    <div style="font-size: 14px; color: var(--amber); margin-bottom: 15px;">내 캐릭터를 선택하세요</div>
    
    <div class="char-grid">
      <div class="char-card selected" data-index="0">
        <div class="char-icon" style="color: var(--cyan);"><svg viewBox="0 0 24 24" fill="currentColor" width="100%" height="100%"><path d="M12 2a2 2 0 0 1 2 2v2h3a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2h-1v2a2 2 0 0 1-2 2H10a2 2 0 0 1-2-2v-2H7a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h3V4a2 2 0 0 1 2-2zm-3 8a1 1 0 1 0 0 2 1 1 0 0 0 0-2zm6 0a1 1 0 1 0 0 2 1 1 0 0 0 0-2z"/></svg></div>
        <div class="char-name">VANGUARD</div>
      </div>
      <div class="char-card" data-index="1">
        <div class="char-icon" style="color: var(--magenta);"><svg viewBox="0 0 24 24" fill="currentColor" width="100%" height="100%"><path d="M12 3c-4.4 0-8 3.6-8 8 0 2.6 1.2 4.9 3.1 6.3L6 22l4-2.2c.6.2 1.3.3 2 .3s1.4-.1 2-.3L18 22l-1.1-4.7c1.9-1.4 3.1-3.7 3.1-6.3 0-4.4-3.6-8-8-8zM9 13a2 2 0 1 1 0-4 2 2 0 0 1 0 4zm6 0a2 2 0 1 1 0-4 2 2 0 0 1 0 4z"/></svg></div>
        <div class="char-name">SEOA</div>
      </div>
      <div class="char-card" data-index="2">
        <div class="char-icon" style="color: #00e5a0;"><svg viewBox="0 0 24 24" fill="currentColor" width="100%" height="100%"><path d="M3 4h18v4H3V4zm2 6h14v10H5V10zm4 3v4h6v-4H9z"/></svg></div>
        <div class="char-name">TITAN</div>
      </div>
    </div>
    
    <button class="btn" id="start-btn" style="background: var(--amber); color: #000;">전투 시작 (START)</button>
    <div style="margin-top: 20px; font-size: 12.5px; color: #fff; font-family: var(--fdisp); line-height: 1.7; text-align: center; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px;">
      <span style="color:var(--cyan)">[P1]</span> 이동: W,A,S,D | 일반공격: F | 기모으기: E | 특수스킬: G<br>
      <span style="color:var(--magenta)">[P2]</span> 이동: 방향키 | 일반공격: L | 기모으기: I | 특수스킬: K<br>
      <span style="color:var(--amber); font-size: 11px;">※ S(↓) + 공격 = 하단 차기 / 공중 + 공격 = 점프 공격 / 스킬은 기(에너지) 50 필요</span>
    </div>
  </div>

  <div id="game-over" class="menu-screen">
    <div class="result-text" id="result-text">PLAYER 1 WINS!</div>
    <button class="btn" id="restart-btn">메인으로 (MAIN MENU)</button>
  </div>

  <canvas id="game-canvas"></canvas>
</div>

<script>
  const canvas = document.getElementById('game-canvas');
  const c = canvas.getContext('2d');
  canvas.width = 1024;
  canvas.height = 576;

  const GRAVITY = 0.7;
  let gameMode = 'cpu'; 
  let timer = 120;
  let timerId;
  let gameActive = false;

  const CHARACTERS = [
    { name: 'VANGUARD', color: '#22d3ee', speed: 5, jump: -15, damage: 8, width: 50 },
    { name: 'SEOA', color: '#ff5c8a', speed: 8, jump: -17, damage: 5, width: 40 }, 
    { name: 'TITAN', color: '#00e5a0', speed: 3, jump: -12, damage: 15, width: 70 }
  ];
  let selectedCharIndex = 0;

  // 파티클 (임팩트 효과) 클래스
  class Particle {
    constructor(x, y, color, velocity, radius) {
      this.x = x; this.y = y; this.color = color;
      this.velocity = velocity; this.radius = radius;
      this.alpha = 1;
    }
    draw() {
      c.save(); c.globalAlpha = this.alpha; c.beginPath();
      c.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
      c.fillStyle = this.color; c.fill(); c.restore();
    }
    update() {
      this.draw();
      this.x += this.velocity.x; this.y += this.velocity.y;
      this.alpha -= 0.03;
    }
  }
  const particles = [];
  function spawnParticles(x, y, color, count = 15) {
    for (let i = 0; i < count; i++) {
      particles.push(new Particle(x, y, color, { x: (Math.random() - 0.5) * 15, y: (Math.random() - 0.5) * 15 }, Math.random() * 4 + 2));
    }
  }

  class Fighter {
    constructor({ position, velocity, charData, isEnemy = false }) {
      this.position = position;
      this.velocity = velocity;
      this.width = charData.width;
      this.height = 140;
      this.color = charData.color;
      this.speed = charData.speed;
      this.jumpPower = charData.jump;
      this.damage = charData.damage;
      this.isEnemy = isEnemy;
      
      this.health = 100;
      this.energy = 0; // 특수 스킬을 위한 기 에너지 (0~100)
      
      this.attackBox = { position: { x: this.position.x, y: this.position.y }, width: 80, height: 40 };
      this.skillBox = { position: { x: this.position.x, y: this.position.y }, width: 200, height: 100 };
      
      this.isAttacking = false;
      this.isSkilling = false;
      this.isCharging = false;
      this.isCrouching = false;
      this.hasHit = false;
      
      this.lastKey = isEnemy ? 'ArrowLeft' : 'd';
    }

    draw() {
      const { x, y } = this.position;
      const isLeft = (this.lastKey === 'a' || this.lastKey === 'ArrowLeft');
      const groundY = canvas.height - 50;
      const isInAir = (this.position.y + this.height) < groundY;
      
      // 기 모으기 오라 효과
      if (this.isCharging) {
        c.save(); c.globalAlpha = 0.3 + Math.random() * 0.2;
        c.fillStyle = '#ffb547';
        c.beginPath(); c.arc(x + this.width/2, y + this.height/2, this.height/1.2 + Math.random()*10, 0, Math.PI*2); c.fill();
        c.restore();
        // 기 모을 때 작은 파티클 방출
        if(Math.random() < 0.3) particles.push(new Particle(x + Math.random()*this.width, y + this.height, '#ffb547', {x: (Math.random()-0.5)*2, y: -Math.random()*5}, 2));
      }

      // 앉기 모션 시 크기 및 위치 조정
      let drawY = y;
      let drawHeight = this.height;
      if (this.isCrouching && !isInAir) {
        drawY = y + 50;
        drawHeight = this.height - 50;
      }

      // 몸통
      c.fillStyle = this.color;
      c.fillRect(x, drawY + 30, this.width, drawHeight - 50); 
      
      // 머리
      c.beginPath(); c.arc(x + this.width / 2, drawY + 15, 20, 0, Math.PI * 2); c.fill();
      
      // 눈동자
      c.fillStyle = '#000';
      const eyeX = isLeft ? -5 : 5;
      c.fillRect(x + this.width / 2 + eyeX - 6, drawY + 10, 4, 4);
      c.fillRect(x + this.width / 2 + eyeX + 6, drawY + 10, 4, 4);

      // 다리
      c.fillStyle = this.color;
      if (!this.isCrouching || isInAir) {
        c.fillRect(x + 5, drawY + drawHeight - 20, 10, 20);
        c.fillRect(x + this.width - 15, drawY + drawHeight - 20, 10, 20);
      } else {
        // 앉았을 때 구부린 다리
        c.fillRect(x + 5, drawY + drawHeight - 10, 30, 10);
      }

      // 공격 및 모션
      c.fillStyle = '#fff';
      if (this.isAttacking) {
        if (isInAir) {
          // 점프 공격 (아래로 내려찍기)
          c.fillStyle = '#ffb547';
          if (isLeft) {
            c.fillRect(x - 30, drawY + drawHeight - 20, 40, 20);
          } else {
            c.fillRect(x + this.width - 10, drawY + drawHeight - 20, 40, 20);
          }
        } else if (this.isCrouching) {
          // 하단 발차기
          if (isLeft) c.fillRect(x - 50, drawY + drawHeight - 15, 60, 15);
          else c.fillRect(x + this.width - 10, drawY + drawHeight - 15, 60, 15);
        } else {
          // 일반 공격
          if (isLeft) c.fillRect(x - 40, drawY + 45, 50, 12);
          else c.fillRect(x + this.width - 10, drawY + 45, 50, 12);
        }
      } else if (this.isSkilling) {
        // 화려한 특수 스킬 이펙트
        c.fillStyle = this.color;
        c.globalAlpha = 0.8;
        if (isLeft) {
          c.fillRect(x - 200, drawY - 20, 200, 100);
          spawnParticles(x - 200, drawY + 30, this.color, 2);
        } else {
          c.fillRect(x + this.width, drawY - 20, 200, 100);
          spawnParticles(x + this.width + 200, drawY + 30, this.color, 2);
        }
        c.globalAlpha = 1;
      }
    }

    update() {
      this.draw();
      
      const isLeft = (this.lastKey === 'a' || this.lastKey === 'ArrowLeft');
      const groundY = canvas.height - 50;
      const isInAir = (this.position.y + this.height) < groundY;

      // 타격 박스 위치 업데이트 로직
      if (this.isCrouching && !isInAir) {
        this.attackBox.position.x = isLeft ? this.position.x - 50 : this.position.x + this.width;
        this.attackBox.position.y = this.position.y + this.height - 15;
      } else if (isInAir) {
        this.attackBox.position.x = isLeft ? this.position.x - 30 : this.position.x + this.width - 10;
        this.attackBox.position.y = this.position.y + this.height - 20;
      } else {
        this.attackBox.position.x = isLeft ? this.position.x - this.attackBox.width + this.width : this.position.x;
        this.attackBox.position.y = this.position.y + 40;
      }

      this.skillBox.position.x = isLeft ? this.position.x - this.skillBox.width + this.width : this.position.x;
      this.skillBox.position.y = this.position.y - 20;

      // 기 모으기 로직
      if (this.isCharging) {
        this.energy = Math.min(100, this.energy + 0.5);
      }

      // 물리 엔진
      this.position.x += this.velocity.x;
      this.position.y += this.velocity.y;

      if (this.position.y + this.height + this.velocity.y >= groundY) {
        this.velocity.y = 0;
        this.position.y = groundY - this.height;
      } else {
        this.velocity.y += GRAVITY;
      }

      // 벽 뚫기 방지
      if(this.position.x <= 0) this.position.x = 0;
      if(this.position.x + this.width >= canvas.width) this.position.x = canvas.width - this.width;
    }

    attack() {
      if(this.isAttacking || this.isSkilling) return;
      this.isAttacking = true;
      this.hasHit = false;
      setTimeout(() => { this.isAttacking = false; }, 150);
    }

    skill() {
      if(this.isAttacking || this.isSkilling || this.energy < 50) return; // 에너지 50 소모
      
      this.energy -= 50;
      this.isSkilling = true;
      this.hasHit = false;
      
      // 스킬 발동 시 주변 폭발 이펙트
      spawnParticles(this.position.x + this.width/2, this.position.y + this.height/2, '#ffb547', 30);
      
      setTimeout(() => { this.isSkilling = false; }, 300);
    }
  }

  let player, enemy;
  const keys = {
    a: { pressed: false }, d: { pressed: false }, w: { pressed: false }, s: { pressed: false }, e: { pressed: false },
    ArrowLeft: { pressed: false }, ArrowRight: { pressed: false }, ArrowUp: { pressed: false }, ArrowDown: { pressed: false }, i: { pressed: false }
  };

  document.getElementById('mode-cpu').addEventListener('click', () => setMode('cpu'));
  document.getElementById('mode-p2').addEventListener('click', () => setMode('p2'));
  document.querySelectorAll('.char-card').forEach(card => {
    card.addEventListener('click', () => {
      selectedCharIndex = parseInt(card.getAttribute('data-index'));
      document.querySelectorAll('.char-card').forEach(el => el.classList.remove('selected'));
      card.classList.add('selected');
    });
  });
  document.getElementById('start-btn').addEventListener('click', startGame);
  document.getElementById('restart-btn').addEventListener('click', () => location.reload());
  
  function setMode(mode) {
    gameMode = mode;
    document.getElementById('mode-cpu').classList.remove('active');
    document.getElementById('mode-p2').classList.remove('active');
    document.getElementById(`mode-${mode}`).classList.add('active');
  }

  function startGame() {
    document.getElementById('main-menu').style.display = 'none';
    document.getElementById('hud').style.display = 'flex';
    
    const p1Char = CHARACTERS[selectedCharIndex];
    document.getElementById('p1-name').innerText = p1Char.name;
    player = new Fighter({ position: { x: 150, y: 0 }, velocity: { x: 0, y: 0 }, charData: p1Char });

    const p2Char = CHARACTERS[gameMode === 'cpu' ? Math.floor(Math.random() * CHARACTERS.length) : 2];
    document.getElementById('p2-name').innerText = gameMode === 'cpu' ? `CPU (${p2Char.name})` : `P2 (${p2Char.name})`;
    enemy = new Fighter({ position: { x: 800, y: 0 }, velocity: { x: 0, y: 0 }, charData: p2Char, isEnemy: true });

    gameActive = true;
    timer = 120;
    decreaseTimer();
    animate();
  }

  function rectangularCollision(rect1, rect2, isSkill = false) {
    const box = isSkill ? rect1.skillBox : rect1.attackBox;
    return (
      box.position.x + box.width >= rect2.position.x &&
      box.position.x <= rect2.position.x + rect2.width &&
      box.position.y + box.height >= rect2.position.y &&
      box.position.y <= rect2.position.y + rect2.height
    );
  }

  function animate() {
    if(!gameActive) return;
    window.requestAnimationFrame(animate);
    
    c.fillStyle = '#0d1626'; c.fillRect(0, 0, canvas.width, canvas.height);
    c.fillStyle = '#1e2c43'; c.fillRect(0, canvas.height - 50, canvas.width, 50);

    // 파티클 그리기
    for (let i = particles.length - 1; i >= 0; i--) {
      particles[i].update();
      if (particles[i].alpha <= 0) particles.splice(i, 1);
    }

    player.update();
    enemy.update();

    // UI 에너지 갱신
    document.getElementById('player-energy').style.width = player.energy + '%';
    document.getElementById('enemy-energy').style.width = enemy.energy + '%';

    // P1 이동 및 앉기
    player.velocity.x = 0;
    player.isCrouching = keys.s.pressed;
    player.isCharging = keys.e.pressed;
    if (!player.isCrouching && !player.isCharging) {
      if (keys.a.pressed && player.lastKey === 'a') player.velocity.x = -player.speed;
      else if (keys.d.pressed && player.lastKey === 'd') player.velocity.x = player.speed;
    }

    // P2 이동 및 앉기
    if(gameMode === 'p2') {
      enemy.velocity.x = 0;
      enemy.isCrouching = keys.ArrowDown.pressed;
      enemy.isCharging = keys.i.pressed;
      if (!enemy.isCrouching && !enemy.isCharging) {
        if (keys.ArrowLeft.pressed && enemy.lastKey === 'ArrowLeft') enemy.velocity.x = -enemy.speed;
        else if (keys.ArrowRight.pressed && enemy.lastKey === 'ArrowRight') enemy.velocity.x = enemy.speed;
      }
    } else {
      cpuAI();
    }

    // 타격 판정 및 이펙트 처리 함수
    function handleHit(attacker, defender, isSkill) {
      attacker.hasHit = true;
      const dmg = isSkill ? attacker.damage * 2.5 : attacker.damage;
      defender.health -= dmg;
      
      // 타격 위치에서 파티클 생성
      const hitX = defender.position.x + defender.width / 2;
      const hitY = defender.position.y + defender.height / 2;
      spawnParticles(hitX, hitY, isSkill ? attacker.color : '#fff', isSkill ? 20 : 10);
      
      if(attacker === player) document.getElementById('enemy-health').style.width = Math.max(0, defender.health) + '%';
      else document.getElementById('player-health').style.width = Math.max(0, defender.health) + '%';
    }

    // 공격 처리
    if (player.isAttacking && !player.hasHit && rectangularCollision(player, enemy, false)) handleHit(player, enemy, false);
    if (player.isSkilling && !player.hasHit && rectangularCollision(player, enemy, true)) handleHit(player, enemy, true);
    if (enemy.isAttacking && !enemy.hasHit && rectangularCollision(enemy, player, false)) handleHit(enemy, player, false);
    if (enemy.isSkilling && !enemy.hasHit && rectangularCollision(enemy, player, true)) handleHit(enemy, player, true);

    if (enemy.health <= 0 || player.health <= 0) determineWinner({ player, enemy, timerId });
  }

  function decreaseTimer() {
    if (timer > 0) {
      timerId = setTimeout(decreaseTimer, 1000);
      timer--; document.getElementById('timer').innerText = timer;
    }
    if (timer === 0) determineWinner({ player, enemy, timerId });
  }

  function determineWinner({ player, enemy, timerId }) {
    clearTimeout(timerId); gameActive = false;
    document.getElementById('game-over').style.display = 'flex';
    const resText = document.getElementById('result-text');
    
    if (player.health === enemy.health) resText.innerText = 'TIE!';
    else if (player.health > enemy.health) resText.innerText = 'PLAYER 1 WINS!';
    else resText.innerText = gameMode === 'cpu' ? 'CPU WINS!' : 'PLAYER 2 WINS!';
  }

  function cpuAI() {
    enemy.velocity.x = 0;
    const distance = player.position.x - enemy.position.x;
    const absDist = Math.abs(distance);
    const groundY = canvas.height - 50;
    const isEnemyInAir = (enemy.position.y + enemy.height) < groundY;
    
    enemy.isCharging = false;
    enemy.isCrouching = false;

    // 에너지가 부족하고 멀리 떨어져 있으면 기를 모음
    if (enemy.energy < 50 && absDist > 300 && Math.random() < 0.05) {
      enemy.isCharging = true;
      return; // 기를 모을 땐 움직이지 않음
    }

    // 추격 및 공격
    if (absDist > 100) {
      if (distance > 0) { enemy.velocity.x = enemy.speed - 1; enemy.lastKey = 'ArrowRight'; }
      else { enemy.velocity.x = -(enemy.speed - 1); enemy.lastKey = 'ArrowLeft'; }
    } else {
      // 5% 확률로 앉아서 공격 (하단 킥)
      if (Math.random() < 0.05 && !isEnemyInAir) {
        enemy.isCrouching = true;
        enemy.attack();
      } else if (Math.random() < 0.08) {
        enemy.attack();
      }
    }
    
    // 스킬 사용
    if (enemy.energy >= 50 && absDist < 200 && Math.random() < 0.03) {
      enemy.skill();
    }
    
    // 점프
    if (Math.random() < 0.01 && !isEnemyInAir) {
      enemy.velocity.y = enemy.jumpPower;
    }
  }

  window.addEventListener('keydown', (event) => {
    if(!gameActive) return;
    switch (event.key.toLowerCase()) {
      case 'd': keys.d.pressed = true; player.lastKey = 'd'; break;
      case 'a': keys.a.pressed = true; player.lastKey = 'a'; break;
      case 'w': if(player.position.y >= canvas.height - 50 - player.height) player.velocity.y = player.jumpPower; break;
      case 's': keys.s.pressed = true; break; // 앉기
      case 'e': keys.e.pressed = true; break; // 기 모으기
      case 'f': player.attack(); break;
      case 'g': player.skill(); break;
    }
    if(gameMode === 'p2') {
      switch (event.key.toLowerCase()) {
        case 'arrowright': keys.ArrowRight.pressed = true; enemy.lastKey = 'ArrowRight'; break;
        case 'arrowleft': keys.ArrowLeft.pressed = true; enemy.lastKey = 'ArrowLeft'; break;
        case 'arrowup': if(enemy.position.y >= canvas.height - 50 - enemy.height) enemy.velocity.y = enemy.jumpPower; break;
        case 'arrowdown': keys.ArrowDown.pressed = true; break; // 앉기
        case 'i': keys.i.pressed = true; break; // 기 모으기
        case 'l': enemy.attack(); break;
        case 'k': enemy.skill(); break;
      }
    }
  });

  window.addEventListener('keyup', (event) => {
    switch (event.key.toLowerCase()) {
      case 'd': keys.d.pressed = false; break;
      case 'a': keys.a.pressed = false; break;
      case 's': keys.s.pressed = false; break;
      case 'e': keys.e.pressed = false; break;
      case 'arrowright': keys.ArrowRight.pressed = false; break;
      case 'arrowleft': keys.ArrowLeft.pressed = false; break;
      case 'arrowdown': keys.ArrowDown.pressed = false; break;
      case 'i': keys.i.pressed = false; break;
    }
  });
</script>
</body>
</html>
