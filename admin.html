<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVA ARCADE — 관리자</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Outfit:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--bg0:#070b14;--panel:#111d31;--panel2:#16243b;--border:#1e2c43;--border2:#2c4060;
  --txt:#e6ecf7;--muted:#8194ad;--dim:#516581;--amber:#ffb547;--cyan:#22d3ee;--red:#ff4d6d;--green:#00e5a0;
  --fui:'Outfit','Noto Sans KR',sans-serif;--fdisp:'Orbitron',sans-serif;--fmono:'JetBrains Mono',monospace;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg0);color:var(--txt);font-family:var(--fui);min-height:100vh;
  background-image:radial-gradient(900px 500px at 90% -10%,rgba(255,181,71,.08),transparent 60%);}
button{font-family:inherit;cursor:pointer;border:none;}
input,textarea,select{font-family:inherit;width:100%;background:var(--bg0);border:1px solid var(--border2);
  border-radius:10px;color:var(--txt);padding:11px 13px;font-size:14px;outline:none;}
input:focus,textarea:focus,select:focus{border-color:var(--amber);}
.top{border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;gap:14px;}
.top .wm{font-family:var(--fdisp);font-weight:900;letter-spacing:1px;}.top .wm b{color:var(--amber);}
.top .tag{font-size:11px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;}
.top a{margin-left:auto;color:var(--muted);font-size:13px;text-decoration:none;}.top a:hover{color:var(--amber);}
.wrap{max-width:1080px;margin:0 auto;padding:28px 24px 80px;}
.gate{max-width:420px;margin:80px auto;text-align:center;background:var(--panel);border:1px solid var(--border2);
  border-radius:18px;padding:40px 32px;}
.gate h2{font-family:var(--fdisp);margin-bottom:10px;}.gate p{color:var(--muted);font-size:14px;line-height:1.6;margin-bottom:22px;}
.btn{border-radius:10px;padding:11px 18px;font-weight:600;font-size:14px;transition:filter .15s;}
.btn-pri{background:var(--amber);color:#1a1206;}.btn-pri:hover{filter:brightness(1.07);}
.btn-ghost{background:var(--panel2);border:1px solid var(--border2);color:var(--txt);}
.btn-danger{background:rgba(255,77,109,.14);border:1px solid var(--red);color:var(--red);}
.grid2{display:grid;grid-template-columns:1.1fr 1fr;gap:24px;align-items:start;}
@media(max-width:820px){.grid2{grid-template-columns:1fr;}}
.panel{background:var(--panel);border:1px solid var(--border2);border-radius:16px;padding:22px;}
.panel h3{font-family:var(--fdisp);font-size:14px;letter-spacing:1px;margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.panel h3 .dot{width:8px;height:8px;border-radius:50%;background:var(--amber);}
.field{margin-bottom:14px;}.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.hint{font-size:11px;color:var(--dim);margin-top:5px;}
.actions{display:flex;gap:10px;margin-top:18px;}
.list{display:flex;flex-direction:column;gap:10px;}
.item{display:flex;align-items:center;gap:13px;background:var(--bg0);border:1px solid var(--border);border-radius:12px;padding:12px 14px;}
.swatch{width:40px;height:40px;border-radius:9px;flex-shrink:0;}
.item .t{font-weight:600;font-size:14px;}.item .m{font-size:11.5px;color:var(--dim);font-family:var(--fmono);}
.item .sp{flex:1;}
.icon{width:32px;height:32px;border-radius:8px;background:var(--panel2);color:var(--muted);font-size:14px;}
.icon:hover{color:var(--txt);}
.colorrow{display:flex;gap:10px;align-items:center;}.colorrow input[type=color]{width:46px;height:42px;padding:3px;cursor:pointer;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;background:var(--panel);
  border:1px solid var(--border2);border-radius:11px;padding:12px 20px;font-size:13.5px;transition:all .25s;z-index:99;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.demo{max-width:520px;margin:80px auto;text-align:center;background:var(--panel);border:1px solid var(--red);
  border-radius:18px;padding:40px;color:var(--muted);line-height:1.7;}.demo code{color:var(--amber);}
</style>
</head>
<body>
<div class="top"><span class="wm">NOVA <b>ARCADE</b></span><span class="tag">admin</span><a href="index.html">← 포탈로</a></div>
<div id="root"></div>
<div class="toast" id="toast"></div>

<script type="module">
import {
  DEMO, auth, db, isAdmin,
  GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged,
  collection, doc, getDoc, getDocs, setDoc, deleteDoc, query, orderBy, serverTimestamp,
} from "./firebase-config.js";

const $=(s,r=document)=>r.querySelector(s);
const root=$("#root");
let toastT; function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("show"),2200);}
const slug=(s)=>s.toLowerCase().trim().replace(/[^a-z0-9가-힣\s-]/g,"").replace(/\s+/g,"-").slice(0,40);

if(DEMO){
  root.innerHTML=`<div class="demo"><h2 style="font-family:var(--fdisp);color:var(--txt);margin-bottom:14px">데모 모드</h2>
  관리자 기능은 Firebase 연결 후 사용할 수 있어요.<br><code>firebase-config.js</code>에 키와 <code>ADMIN_UIDS</code>를 채워주세요.</div>`;
}else{
  onAuthStateChanged(auth,(u)=>{
    if(!u) return gate();
    if(!isAdmin(u.uid)) return denied(u);
    dashboard(u);
  });
}

function gate(){
  root.innerHTML=`<div class="gate"><h2>관리자 로그인</h2><p>게임 카탈로그를 관리하려면 관리자 계정으로 로그인하세요.</p>
    <button class="btn btn-pri" id="lg">구글 로그인</button></div>`;
  $("#lg").onclick=async()=>{try{await signInWithPopup(auth,new GoogleAuthProvider());}catch(e){toast("로그인 실패");}};
}
function denied(u){
  // 비관리자: 아무것도 보여주지 않고 즉시 포탈로 리다이렉트
  location.replace("index.html");
}

async function dashboard(u){
  root.innerHTML=`<div class="wrap"><div class="grid2">
    <div class="panel"><h3><span class="dot"></span>게임 추가 / 수정</h3><div id="form"></div></div>
    <div class="panel"><h3><span class="dot" style="background:var(--cyan)"></span>등록된 게임 <span id="cnt" style="color:var(--dim);font-family:var(--fmono)"></span></h3>
      <div style="display:flex;gap:8px;margin-bottom:14px">
        <button class="btn btn-ghost" id="newBtn" style="flex:1">+ 새 게임</button>
        <button class="btn btn-ghost" id="seedBtn">games.json 가져오기</button>
      </div>
      <div class="list" id="list"></div></div>
  </div></div>`;
  $("#newBtn").onclick=()=>renderForm(null);
  $("#seedBtn").onclick=seedImport;
  renderForm(null);
  await refresh();
}

let GAMES=[];
async function refresh(){
  const snap=await getDocs(query(collection(db,"games"),orderBy("order","asc")));
  GAMES=snap.docs.map(d=>({id:d.id,...d.data()}));
  $("#cnt").textContent=`(${GAMES.length})`;
  $("#list").innerHTML=GAMES.map(g=>`<div class="item">
    <div class="swatch" style="background:linear-gradient(135deg,${g.accent||'#ffb547'},${g.accent2||'#22d3ee'})"></div>
    <div><div class="t">${g.title}</div><div class="m">${g.id} · ${g.category||'-'} · ▶${g.playCount||0}${g.enabled===false?' · 숨김':''}</div></div>
    <div class="sp"></div>
    <button class="icon" data-edit="${g.id}" title="수정">✎</button>
    <button class="icon" data-del="${g.id}" title="삭제">🗑</button></div>`).join("")||`<div style="color:var(--dim);font-size:13px;padding:10px">아직 게임이 없어요.</div>`;
  $("#list").querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>renderForm(GAMES.find(g=>g.id===b.dataset.edit)));
  $("#list").querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>del(b.dataset.del));
}

function renderForm(g){
  const e=g||{};
  $("#form").innerHTML=`
  <div class="field"><label>게임 ID (URL용, 영문)</label><input id="f_id" value="${e.id||''}" ${g?'disabled style=opacity:.5':''} placeholder="my-game"><div class="hint">한 번 정하면 변경 불가. 비우면 제목에서 자동 생성.</div></div>
  <div class="row"><div class="field"><label>제목</label><input id="f_title" value="${e.title||''}" placeholder="My Game"></div>
    <div class="field"><label>부제</label><input id="f_subtitle" value="${e.subtitle||''}" placeholder="한 줄 부제"></div></div>
  <div class="field"><label>설명</label><textarea id="f_desc" rows="2" placeholder="게임 소개">${e.description||''}</textarea></div>
  <div class="field"><label>실행 URL</label><input id="f_url" value="${e.url||''}" placeholder="games/my-game/  또는  https://...vercel.app/"><div class="hint">같은 저장소면 상대경로, 외부 호스팅이면 전체 URL.</div></div>
  <div class="row"><div class="field"><label>카테고리</label><input id="f_cat" value="${e.category||''}" placeholder="액션"></div>
    <div class="field"><label>태그 (쉼표 구분)</label><input id="f_tags" value="${(e.tags||[]).join(', ')}" placeholder="슈팅, 모바일"></div></div>
  <div class="field"><label>색상 (커버 그라데이션)</label><div class="colorrow">
    <input type="color" id="f_ac" value="${e.accent||'#ffb547'}"><input type="color" id="f_ac2" value="${e.accent2||'#22d3ee'}">
    <span style="flex:1;height:42px;border-radius:9px;border:1px solid var(--border2)" id="prev"></span></div></div>
  <div class="field"><label>커버 이미지 URL (선택)</label><input id="f_cover" value="${e.cover||''}" placeholder="비우면 색상 커버 사용"></div>
  <div class="row">
    <div class="field"><label>정렬 순서</label><input id="f_order" type="number" value="${e.order??(GAMES.length+1)}"></div>
    <div class="field"><label>옵션</label>
      <label style="display:flex;gap:7px;align-items:center;font-size:13px;color:var(--txt);margin-bottom:6px"><input type="checkbox" id="f_feat" ${e.featured?'checked':''} style="width:auto"> 대표 게임(히어로)</label>
      <label style="display:flex;gap:7px;align-items:center;font-size:13px;color:var(--txt);margin-bottom:6px"><input type="checkbox" id="f_score" ${e.reportsScore?'checked':''} style="width:auto"> 점수 보고(랭킹)</label>
      <label style="display:flex;gap:7px;align-items:center;font-size:13px;color:var(--txt)"><input type="checkbox" id="f_en" ${e.enabled!==false?'checked':''} style="width:auto"> 게시(노출)</label>
    </div></div>
  <div class="actions"><button class="btn btn-pri" id="save" style="flex:1">${g?'수정 저장':'추가하기'}</button>
    ${g?'<button class="btn btn-ghost" id="cancel">취소</button>':''}</div>`;
  const upd=()=>{$("#prev").style.background=`linear-gradient(135deg,${$("#f_ac").value},${$("#f_ac2").value})`;};
  $("#f_ac").oninput=upd;$("#f_ac2").oninput=upd;upd();
  $("#save").onclick=()=>save(g);
  if($("#cancel"))$("#cancel").onclick=()=>renderForm(null);
}

async function save(existing){
  const title=$("#f_title").value.trim();
  if(!title) return toast("제목을 입력하세요");
  const url=$("#f_url").value.trim();
  if(!url) return toast("실행 URL을 입력하세요");
  let id=existing?existing.id:($("#f_id").value.trim()||slug(title));
  if(!id) return toast("게임 ID를 정할 수 없어요");
  const data={
    title, subtitle:$("#f_subtitle").value.trim(), description:$("#f_desc").value.trim(),
    url, category:$("#f_cat").value.trim()||"기타",
    tags:$("#f_tags").value.split(",").map(t=>t.trim()).filter(Boolean),
    accent:$("#f_ac").value, accent2:$("#f_ac2").value, cover:$("#f_cover").value.trim()||null,
    order:Number($("#f_order").value)||99, featured:$("#f_feat").checked,
    reportsScore:$("#f_score").checked, enabled:$("#f_en").checked,
    updatedAt:serverTimestamp(),
  };
  if(!existing){ data.playCount=0; data.createdAt=serverTimestamp(); }
  try{ await setDoc(doc(db,"games",id),data,{merge:true}); toast(existing?"수정했어요":"추가했어요"); renderForm(null); await refresh(); }
  catch(e){ console.error(e); toast("저장 실패 (권한 확인)"); }
}

async function del(id){
  if(!confirm(`'${id}' 게임을 삭제할까요? (카탈로그에서 제거)`)) return;
  try{ await deleteDoc(doc(db,"games",id)); toast("삭제했어요"); await refresh(); }
  catch(e){ toast("삭제 실패"); }
}

async function seedImport(){
  try{
    const j=await (await fetch("games.json")).json();
    let n=0;
    for(const g of (j.games||[])){
      const {id,...rest}=g; if(!id) continue;
      const ref=doc(db,"games",id); const ex=await getDoc(ref);
      if(ex.exists()){ continue; } // 기존 항목은 건너뜀
      await setDoc(ref,{...rest,createdAt:serverTimestamp(),updatedAt:serverTimestamp()}); n++;
    }
    toast(n?`${n}개 가져왔어요`:"새로 가져올 항목이 없어요"); await refresh();
  }catch(e){ console.error(e); toast("가져오기 실패"); }
}
</script>
</body>
</html>
